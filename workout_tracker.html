// ═══════════════════════════════════════════════════ CORNER AUTO-TIMER
let _ctInterval=null,_ctRemaining=0,_ctTotal=0;
function startCornerTimer(){
  // figure out current rest period from active week
  const restSec=_activeRestSec||90;
  _ctTotal=restSec;_ctRemaining=restSec;
  if(_ctInterval)clearInterval(_ctInterval);
  updateCornerTimer();
  document.getElementById('corner-timer').classList.add('show');
  _ctInterval=setInterval(()=>{
    _ctRemaining--;
    updateCornerTimer();
    if(_ctRemaining<=0){
      clearInterval(_ctInterval);_ctInterval=null;
      document.getElementById('corner-timer').classList.remove('show');
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      toast('✓ Rest complete — next set!');
    }
  },1000);
}
function updateCornerTimer(){
  const ring=document.getElementById('ct-ring');
  const count=document.getElementById('ct-count');
  if(!ring||!count)return;
  const circ=2*Math.PI*24;
  const pct=_ctRemaining/_ctTotal;
  ring.setAttribute('stroke-dasharray',circ.toFixed(1));
  ring.setAttribute('stroke-dashoffset',(circ*(1-pct)).toFixed(1));
  ring.style.stroke=_ctRemaining<=10?'var(--red)':_ctRemaining<=30?'var(--p3)':'var(--accent)';
  count.textContent=_ctRemaining;
}
function cornerTimerTap(){
  // tap to dismiss
  if(_ctInterval)clearInterval(_ctInterval);_ctInterval=null;
  document.getElementById('corner-timer').classList.remove('show');
}
let _activeRestSec=90; // updated when week view opens

// ═══════════════════════════════════════════════════ WEEKLY VOLUME
function getWeekVolume(phaseId,week){
  const ph=ph_(phaseId);
  let sets=0,reps=0,tonnage=0;
  ph.days.forEach((day,di)=>{
    const key=wk(ph.id,week,di);
    if(!S.completed[key])return;
    day.exercises.forEach((ex,ei)=>{
      const ek=`${key}_e${ei}`;
      (S.sets[ek]||[]).forEach(s=>{
        if(s.reps||s.done){
          sets++;
          const r=parseInt(s.reps)||0;
          const w=parseFloat(s.weight)||0;
          reps+=r;
          if(w>0)tonnage+=r*w;
        }
      });
    });
  });
  // get prev matching week
  let prevSets=0,prevReps=0;
  const allW=[];
  PHASES.forEach(p=>p.weeks.forEach(w=>allW.push({pid:p.id,w})));
  const ci=allW.findIndex(e=>e.pid===phaseId&&e.w===week);
  for(let i=ci-1;i>=0;i--){
    const prev=allW[i];
    const prevPh=ph_(prev.pid);
    if(prevPh.days.some((_,di)=>S.completed[wk(prev.pid,prev.w,di)])){
      prevPh.days.forEach((day,di)=>{
        const key=wk(prev.pid,prev.w,di);
        if(!S.completed[key])return;
        day.exercises.forEach((ex,ei)=>{
          (S.sets[`${key}_e${ei}`]||[]).forEach(s=>{if(s.reps||s.done){prevSets++;prevReps+=parseInt(s.reps)||0;}});
        });
      });
      break;
    }
  }
  return{sets,reps,tonnage:Math.round(tonnage),prevSets,prevReps};
}

// ═══════════════════════════════════════════════════ EXERCISE NOTE HISTORY
function getExNoteHistory(exName,currentEk){
  const results=[];
  PHASES.forEach(ph=>ph.weeks.forEach(w=>ph.days.forEach((day,di)=>{
    const key=wk(ph.id,w,di);
    if(!S.completed[key])return;
    day.exercises.forEach((ex,ei)=>{
      if(ex.name!==exName)return;
      const ek=`${key}_e${ei}`;
      if(ek===currentEk)return; // skip current
      // check set notes
      const setNotes=(S.sets[ek]||[]).map(s=>s.notes).filter(Boolean);
      if(setNotes.length){
        const he=S.history.find(h=>h.key===key);
        results.push({date:he?he.date:`Wk ${w}`,note:setNotes.join(' · ')});
      }
    });
  })));
  return results.slice(-3).reverse();
}

// ═══════════════════════════════════════════════════ REST DAY LOG
function logRestActivity(activity,el){
  const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(!S.restDays)S.restDays={};
  S.restDays[today]=S.restDays[today]===activity?'':activity;
  save();
  el.closest('.rdl-pills').querySelectorAll('.rdl-pill').forEach(p=>p.classList.remove('on'));
  if(S.restDays[today])el.classList.add('on');
  toast(S.restDays[today]?`Rest activity: ${activity}`:'Activity cleared');
}

// ═══════════════════════════════════════════════════ HISTORY SEARCH + FILTER
let _histFilter='';
function filterHistory(q){
  _histFilter=q.toLowerCase();
  buildHistBody();
}
function buildHistBody(){
  const hb=document.getElementById('hist-body');if(!hb)return;
  if(!S.history.length){hb.innerHTML='<div class="hist-empty">No workouts logged yet.</div>';return;}
  const filtered=_histFilter?S.history.filter(h=>
    h.title.toLowerCase().includes(_histFilter)||
    h.phase.toLowerCase().includes(_histFilter)||
    h.date.toLowerCase().includes(_histFilter)||
    (h.note&&h.note.toLowerCase().includes(_histFilter))||
    (h.day&&h.day.toLowerCase().includes(_histFilter))
  ):S.history;
  if(!filtered.length){hb.innerHTML='<div class="hist-empty">No results for "'+_histFilter+'"</div>';return;}
  let html=`<table class="hist-tbl"><thead><tr><th>Date</th><th>Day</th><th>Workout</th><th>Phase</th><th>Sets</th><th>Reps</th></tr></thead><tbody>`;
  filtered.forEach(h=>{
    const col=h.phaseColor||'p1';
    html+=`<tr>
      <td><div style="font-weight:600;color:var(--text)">${h.date}</div><div style="font-size:11px;color:var(--text3)">Wk ${h.week} · ${h.day}</div></td>
      <td style="font-weight:600;color:var(--text)">${h.trainedDay||'—'}</td>
      <td style="color:var(--text)"><div style="font-weight:600">${h.title}</div>${h.note?`<div class="hist-note">"${h.note.substring(0,60)}${h.note.length>60?'…':''}"</div>`:''}</td>
      <td><span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--${col}bg);color:var(--${col})">${h.phase}</span></td>
      <td>${h.ts||'—'}</td><td>${h.tr||'—'}</td>
    </tr>`;
  });
  hb.innerHTML=html+'</tbody></table>';
}

// ═══════════════════════════════════════════════════ CSV EXPORT
function exportCSV(){
  let csv='Date,Day Trained,Phase,Week,Workout,Sets,Reps,Notes\n';
  S.history.forEach(h=>{
    csv+=`"${h.date}","${h.trainedDay||''}","${h.phase}","${h.week}","${h.title}","${h.ts||0}","${h.tr||0}","${(h.note||'').replace(/"/g,"'")}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`lift12-history-${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('CSV exported ✓');
}

// ═══════════════════════════════════════════════════ QUICK-LOG MODE
let _qlExercises=[],_qlIdx=0,_qlKey='';

function openQL(ek,e){
  if(e)e.stopPropagation();
  // build exercise list for this session from ek key
  const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m)return;
  const ph=ph_(parseInt(m[1]));
  const week=parseInt(m[2]),di=parseInt(m[3]),ei=parseInt(m[4]);
  _qlKey=wk(ph.id,week,di);
  const day=ph.days[di];
  _qlExercises=day.exercises.map((ex,i)=>({ex,ek:`${_qlKey}_e${i}`,ei:i,ph}));
  _qlIdx=ei;
  _activeRestSec=ph.restSec||90;
  document.getElementById('ql-overlay').style.display='flex';
  document.body.style.overflow='hidden';
  qlRender();
}

function qlRender(){
  const item=_qlExercises[_qlIdx];if(!item)return;
  const{ex,ek,ph}=item;
  if(!S.sets[ek])S.sets[ek]=Array.from({length:ex.sets},()=>({reps:'',weight:'',notes:'',done:false}));
  const sets=S.sets[ek];
  const prevSets=getPrevSetData(ek);
  document.getElementById('ql-ex-name').textContent=ex.name;
  document.getElementById('ql-progress').textContent=`Exercise ${_qlIdx+1} of ${_qlExercises.length} · ${ex.p}`;
  document.getElementById('ql-ex-sub').textContent=ex.note||ex.w;
  // prev
  const prevEl=document.getElementById('ql-prev');
  if(prevSets.length){
    prevEl.style.display='block';
    prevEl.textContent='Last time: '+prevSets.map((s,i)=>`S${i+1}: ${s.reps||'?'} reps @ ${s.weight||'?'} lbs`).filter((_,i)=>prevSets[i].reps||prevSets[i].weight).join(' · ');
  } else prevEl.style.display='none';
  // sets
  const setsEl=document.getElementById('ql-sets');
  const et=getExType(ex.name);
  setsEl.innerHTML=sets.map((s,si)=>`
    <div class="ql-set-row">
      <div class="ql-set-lbl">S${si+1}</div>
      <input class="ql-input${s.reps?' v':''}" type="number" inputmode="numeric" placeholder="${et.type==='time'?'secs':'reps'}"
        value="${s.reps||s.duration||''}" id="qlr-${ek}-${si}"
        onchange="qlUpd('${ek}',${si},'${et.type==='time'?'duration':'reps'}',this.value)">
      ${et.type==='weight'?`<input class="ql-input${s.weight?' v':''}" type="text" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" id="qlw-${ek}-${si}"
        onchange="qlUpd('${ek}',${si},'weight',this.value)">`:'<div></div>'}
      <button class="ql-ok${s.done?' done':''}" id="qlok-${ek}-${si}"
        onclick="qlToggle('${ek}',${si})">${s.done?'✓':'○'}</button>
    </div>
  `).join('');
  // nav buttons
  document.getElementById('ql-prev-btn').style.display=_qlIdx>0?'block':'none';
  document.getElementById('ql-next-btn').textContent=_qlIdx<_qlExercises.length-1?'Next →':'Done ✓';
}

function qlUpd(ek,si,field,val){
  upd(ek,si,field,val);
  const inpId=field==='reps'||field==='duration'?`qlr-${ek}-${si}`:`qlw-${ek}-${si}`;
  const inp=document.getElementById(inpId);if(inp)inp.classList.toggle('v',!!val);
}
function qlToggle(ek,si){
  togSet(ek,si);
  const btn=document.getElementById(`qlok-${ek}-${si}`);
  if(btn){btn.classList.toggle('done',S.sets[ek][si].done);btn.textContent=S.sets[ek][si].done?'✓':'○';}
}
function qlSyncOkBtn(ek,si){
  const btn=document.getElementById(`qlok-${ek}-${si}`);
  if(btn){btn.classList.toggle('done',S.sets[ek]&&S.sets[ek][si]&&S.sets[ek][si].done);btn.textContent=(S.sets[ek]&&S.sets[ek][si]&&S.sets[ek][si].done)?'✓':'○';}
}
function qlNav(dir){
  const next=_qlIdx+dir;
  if(next<0)return;
  if(next>=_qlExercises.length){closeQL();return;}
  _qlIdx=next;qlRender();
}
function closeQL(){
  document.getElementById('ql-overlay').style.display='none';
  document.body.style.overflow='';
  // re-render set rows in the main view
  if(curPhase&&curWeek){
    const ph=ph_(curPhase);
    ph.days.forEach((day,di)=>{
      const key=wk(ph.id,curWeek,di);
      day.exercises.forEach((ex,ei)=>renderSetRows(ex,`${key}_e${ei}`));
    });
  }
}

// ═══════════════════════════════════════════════════ TOAST
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ═══════════════════════════════════════════════════ AUTH UI
function updateAuthUI(user){
  const el=document.getElementById('auth-ui');if(!el)return;
  if(user){
    const name=user.displayName?user.displayName.split(' ')[0]:'You';
    const photo=user.photoURL?`<img class="auth-avatar" src="${user.photoURL}" alt="">`:'👤';
    el.innerHTML=`<button class="auth-btn signed-in" onclick="window.fbSignOut()">${photo} ${name} · Sign out</button>`;
  } else {
    el.innerHTML=`<button class="auth-btn" onclick="window.fbSignIn()">Sign in with Google</button>`;
  }
}
function renderSyncStatus(msg){
  const el=document.getElementById('sync-status');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// expose to module scope
window.updateAuthUI = updateAuthUI;
window.renderSyncStatus = renderSyncStatus;

// ═══════════════════════════════════════════════════ INIT
// Show sign-in screen if no auth yet — Firebase module will call renderHome when signed in
updateAuthUI(null);
go('home');
</script>
