<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LIFT12 — 12-Week Strength Program</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');
/* ── THEME ── */
:root{
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--surface3:#242830;
  --border:#2a2d35;--border2:#363a45;
  --text:#e8eaf0;--text2:#9499a8;--text3:#5c6070;
  --accent:#e8ff47;--accent2:#b8d400;--atxt:#000;
  --p1:#4a9eff;--p1bg:#0d2140;--p2:#2fd88a;--p2bg:#0b2c1e;--p3:#ff9640;--p3bg:#2a1800;
  --red:#ff4f4f;--redbg:rgba(255,79,79,.1);--gold:#ffd700;--goldbg:rgba(255,215,0,.1);
  --r:10px;
}
[data-theme="light"]{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f4;--surface3:#e8eaee;
  --border:#dde0e8;--border2:#c8ccd8;
  --text:#1a1c22;--text2:#555a6e;--text3:#9499a8;
  --accent:#5a8a00;--accent2:#4a7200;--atxt:#fff;
  --p1:#1a6fd4;--p1bg:#ddeeff;--p2:#0d9e60;--p2bg:#d4f5e6;--p3:#c96000;--p3bg:#ffe8d4;
  --red:#cc2222;--redbg:rgba(204,34,34,.08);--gold:#b8860b;--goldbg:rgba(184,134,11,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:300;display:flex;align-items:center;gap:10px;height:54px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;color:var(--accent);text-transform:uppercase;cursor:pointer;user-select:none;flex-shrink:0;}
.logo span{color:var(--text3);font-weight:400;}
.bc{display:flex;align-items:center;gap:4px;font-size:12px;overflow:hidden;flex:1;min-width:0;}
.crumb{cursor:pointer;color:var(--text2);transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;}
.crumb:hover{color:var(--accent);}
.crumb.last{color:var(--text);cursor:default;}
.sep{color:var(--text3);flex-shrink:0;}
.hdr-r{margin-left:auto;display:flex;gap:6px;flex-shrink:0;}
.hbtn{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hbtn:hover,.hbtn.on{background:var(--accent);color:var(--atxt);border-color:var(--accent);}
.icon-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.icon-btn:hover{background:var(--surface3);}

/* ── LAYOUT ── */
.main{max-width:960px;margin:0 auto;padding:24px 16px 100px;}
.view{display:none;}.view.on{display:block;}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;transition:all .15s;margin-bottom:20px;}
.back-btn:hover{color:var(--text);border-color:var(--border2);}
.shd{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:5px;margin-bottom:8px;}
.badge.p1{background:var(--p1bg);color:var(--p1);}.badge.p2{background:var(--p2bg);color:var(--p2);}.badge.p3{background:var(--p3bg);color:var(--p3);}
.pbar-wrap{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.pbar{height:100%;border-radius:4px;transition:width .6s;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}

/* ── HOME ── */
.home-title{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;line-height:1;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.home-title em{color:var(--accent);font-style:normal;}
.home-sub{font-size:14px;color:var(--text2);margin-bottom:24px;}

/* READINESS */
.readiness-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}
.readiness-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.readiness-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.rq-item{text-align:center;}
.rq-label{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;}
.rq-stars{display:flex;justify-content:center;gap:4px;}
.rq-star{font-size:20px;cursor:pointer;transition:transform .1s;user-select:none;opacity:.3;}
.rq-star.on{opacity:1;}
.rq-star:hover{transform:scale(1.2);}
.readiness-save{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border-radius:7px;border:none;background:var(--accent);color:var(--atxt);cursor:pointer;transition:all .15s;margin-top:14px;width:100%;}
.readiness-save:hover{background:var(--accent2);}
.readiness-summary{font-size:12px;color:var(--text2);margin-top:10px;padding:8px 10px;background:var(--surface2);border-radius:6px;}

/* STREAK */
.streak-bar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;}
.streak-flame{font-size:28px;line-height:1;}
.streak-info{flex:1;}
.streak-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--accent);line-height:1;}
.streak-label{font-size:12px;color:var(--text2);margin-top:2px;}
.streak-dots{display:flex;gap:5px;flex-wrap:wrap;max-width:160px;}
.streak-dot{width:10px;height:10px;border-radius:50%;background:var(--border2);transition:background .3s;}
.streak-dot.active{background:var(--accent);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:5px;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;}
.stat-val small{font-size:13px;font-weight:400;color:var(--text2);margin-left:2px;}
.stat-note{font-size:11px;color:var(--text3);margin-top:3px;}

/* PHASE CARDS */
.phase-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.pc.p1::before{background:var(--p1);}.pc.p2::before{background:var(--p2);}.pc.p3::before{background:var(--p3);}
.pc:hover{border-color:var(--border2);transform:translateY(-2px);}
.pc-ring-wrap{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.pc-num{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;line-height:1;}
.pc.p1 .pc-num{color:var(--p1);}.pc.p2 .pc-num{color:var(--p2);}.pc.p3 .pc-num{color:var(--p3);}
.pc-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.pc-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.pc-prog{font-size:11px;color:var(--text3);margin-top:8px;}

/* MILESTONES */
.milestone-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}
.milestone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px;}
.ms-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;transition:border-color .2s;}
.ms-item.earned{border-color:var(--gold);background:var(--goldbg);}
.ms-icon{font-size:24px;margin-bottom:4px;}
.ms-name{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px;}
.ms-desc{font-size:10px;color:var(--text3);}
.ms-item.earned .ms-name{color:var(--gold);}

/* HEATMAP */
.heatmap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}
.heatmap-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:12px;}
.hm-day{width:14px;height:14px;border-radius:3px;background:var(--surface2);border:1px solid var(--border);transition:background .2s;}
.hm-day.done{background:var(--p2);border-color:var(--p2);}
.hm-day.skipped{background:var(--border2);border-color:var(--border2);}
.hm-day.today{border-color:var(--accent);}
.hm-legend{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:11px;color:var(--text3);}
.hm-swatch{width:12px;height:12px;border-radius:2px;}

/* BODYWEIGHT */
.bw-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.bw-title{font-size:14px;font-weight:600;}
.bw-row{display:flex;gap:8px;align-items:center;}
.bw-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;font-weight:600;color:var(--text);width:90px;text-align:center;-moz-appearance:textfield;}
.bw-input::-webkit-inner-spin-button,.bw-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.bw-input:focus{outline:none;border-color:var(--accent);}
.bw-add-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:7px 14px;border-radius:6px;border:none;background:var(--accent);color:var(--atxt);cursor:pointer;}
.bw-log{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-top:10px;}
.bw-pill{font-size:11px;padding:4px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);white-space:nowrap;flex-shrink:0;}

/* PR BOARD */
.pr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:12px;}
.pr-card{background:var(--surface2);border:1px solid var(--goldbg);border-radius:8px;padding:10px 12px;}
.pr-ex{font-size:11px;color:var(--text3);margin-bottom:3px;line-height:1.3;}
.pr-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--gold);}
.pr-val small{font-size:12px;font-weight:400;color:var(--text3);margin-left:2px;}
.pr-date{font-size:10px;color:var(--text3);margin-top:2px;}
.pr-1rm{font-size:10px;color:var(--text3);margin-top:1px;}
.pr-badge-inline{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--goldbg);color:var(--gold);border:1px solid rgba(255,215,0,.25);margin-left:4px;vertical-align:middle;}

/* CHART */
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}
.chart-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--text);cursor:pointer;margin-bottom:14px;}
.chart-select:focus{outline:none;border-color:var(--accent);}
.chart-wrap{height:160px;position:relative;}
.chart-empty{font-size:13px;color:var(--text3);padding:40px;text-align:center;}

/* SYNC */
.sync-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.sync-icon{font-size:20px;flex-shrink:0;}
.sync-text{flex:1;min-width:160px;}
.sync-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.sync-sub{font-size:11px;color:var(--text3);line-height:1.5;}
.sync-last{font-size:10px;color:var(--text3);margin-top:4px;}
.sync-btns{display:flex;gap:8px;flex-shrink:0;}
.exp-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:7px;border:none;background:var(--accent);color:var(--atxt);cursor:pointer;transition:all .15s;white-space:nowrap;}
.exp-btn:hover{background:var(--accent2);}
.imp-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.imp-btn:hover{color:var(--text);}

/* ── PHASE VIEW ── */
.pv-title{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;line-height:1;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.pv-desc{font-size:13px;color:var(--text2);line-height:1.7;max-width:560px;margin-bottom:28px;}
.weeks-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.wk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .15s;}
.wk-card:hover{border-color:var(--border2);}
.wk-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.wk-num.p1{color:var(--p1);}.wk-num.p2{color:var(--p2);}.wk-num.p3{color:var(--p3);}
.wk-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1;margin-bottom:12px;}
.day-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.dpill{font-size:11px;font-weight:600;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.dpill.done{border-color:var(--p2);color:var(--p2);background:var(--p2bg);}
.dpill.skipped{color:var(--text3);text-decoration:line-through;}
.wk-stat{font-size:11px;color:var(--text3);}
.wk-done{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--p2bg);color:var(--p2);margin-top:8px;}

/* ── WEEK VIEW ── */
.wv-title{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;line-height:1;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.wv-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.view-toggle{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.vt-btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;}
.vt-btn.on{background:var(--accent);color:var(--atxt);border-color:var(--accent);}

/* AUTO-PROGRESSION BANNER */
.prog-banner{background:var(--p2bg);border:1px solid var(--p2);border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--p2);display:none;}
.prog-banner.show{display:block;}
.prog-banner strong{font-weight:700;}

/* DAY SECTION */
.day-section{margin-bottom:16px;}
.ds-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;transition:background .15s;}
.ds-hd:hover{background:var(--surface2);}
.ds-hd.col{border-radius:var(--r);}
.ds-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;flex-shrink:0;}
.ds-tag.p1{background:var(--p1bg);color:var(--p1);}.ds-tag.p2{background:var(--p2bg);color:var(--p2);}.ds-tag.p3{background:var(--p3bg);color:var(--p3);}
.ds-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;flex:1;}
.ds-chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;display:none;flex-shrink:0;}
.ds-hd.done .ds-chip.done-chip{display:block;background:var(--p2bg);color:var(--p2);}
.ds-hd.skipped .ds-chip.skip-chip{display:block;background:var(--surface2);color:var(--text3);border:1px solid var(--border2);}
.ds-chev{color:var(--text3);font-size:11px;transition:transform .2s;flex-shrink:0;}
.ds-hd.col .ds-chev{transform:rotate(-90deg);}
.ds-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:16px;}
.ds-body.hide{display:none;}

/* SESSION ACTIONS */
.session-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.act-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.act-btn:hover{color:var(--text);border-color:var(--text3);}
.act-btn.primary{background:var(--accent);color:var(--atxt);border-color:var(--accent);}
.act-btn.primary:hover{background:var(--accent2);}
.act-btn.done{background:var(--p2bg);color:var(--p2);border-color:var(--p2);}
.act-btn.skipped{color:var(--text3);}

/* SESSION NOTE */
.session-note{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--text);resize:none;min-height:56px;line-height:1.5;transition:border-color .15s;margin-bottom:14px;}
.session-note:focus{outline:none;border-color:var(--accent);}
.session-note::placeholder{color:var(--text3);}

/* SHARE WORKOUT */
.share-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;}
.share-btn:hover{color:var(--text);}

/* EXERCISE LIST */
.ex-list{display:flex;flex-direction:column;gap:6px;}

/* SUPERSET CONNECTOR */
.superset-connector{display:flex;align-items:center;gap:8px;padding:2px 14px;margin:-2px 0;}
.ss-line{flex:1;height:1px;background:var(--border2);border:none;}
.ss-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);background:var(--surface);padding:2px 8px;border:1px solid var(--border2);border-radius:10px;white-space:nowrap;flex-shrink:0;}

/* EXERCISE CARD */
.ex-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s;}
.ex-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;min-height:56px;}
.ex-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text3);width:18px;flex-shrink:0;}
.ex-info{flex:1;min-width:0;}
.ex-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ex-name-span{font-size:14px;font-weight:600;color:var(--text);cursor:pointer;border-bottom:1px dashed var(--text3);transition:color .15s,border-color .15s;}
.ex-name-span:hover{color:var(--accent);border-color:var(--accent);}
.yt-pill{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(255,40,40,.1);color:#ff5555;border:1px solid rgba(255,40,40,.2);cursor:pointer;font-family:'Barlow',sans-serif;transition:background .15s;white-space:nowrap;line-height:1.4;}
.yt-pill:hover{background:rgba(255,40,40,.2);}
.pr-badge-inline{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--goldbg);color:var(--gold);border:1px solid rgba(255,215,0,.25);margin-left:4px;vertical-align:middle;}
.ex-pres{font-size:11px;color:var(--text2);margin-top:2px;}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ex-wt{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(--bg);border:1px solid var(--border);color:var(--text2);white-space:nowrap;}
.ex-warmup-btn{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s;}
.ex-warmup-btn:hover{border-color:var(--accent);color:var(--accent);}
.ex-chev{color:var(--text3);font-size:10px;transition:transform .2s;flex-shrink:0;}
.ex-card.open .ex-chev{transform:rotate(180deg);}
.ex-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}
.ex-note-bar{font-size:12px;color:var(--text3);padding:8px 0 10px;line-height:1.6;border-bottom:1px solid var(--border);margin-bottom:10px;}

/* WARM-UP SETS */
.warmup-section{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:10px;display:none;}
.warmup-section.show{display:block;}
.warmup-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.warmup-row{display:flex;gap:8px;flex-wrap:wrap;}
.warmup-set{font-size:12px;font-weight:600;padding:4px 10px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);}

/* PLATE CALCULATOR */
.plate-calc{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:10px;display:none;}
.plate-calc.show{display:block;}
.plate-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.plate-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.plate-chip{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;padding:5px 10px;border-radius:6px;border:2px solid;white-space:nowrap;}
.plate-chip.p45{background:rgba(255,50,50,.15);border-color:#ff3232;color:#ff5555;}
.plate-chip.p35{background:rgba(255,150,50,.15);border-color:#ff9632;color:#ffaa55;}
.plate-chip.p25{background:rgba(50,150,255,.15);border-color:#3296ff;color:#55aaff;}
.plate-chip.p10{background:rgba(50,200,50,.15);border-color:#32c832;color:#55dd55;}
.plate-chip.p5{background:rgba(200,200,50,.15);border-color:#c8c832;color:#dddd55;}
.plate-chip.p2{background:rgba(150,100,255,.15);border-color:#9664ff;color:#aa88ff;}
.plate-per-side{font-size:11px;color:var(--text3);}

/* AUTO-PROGRESSION */
.autoprog-box{background:var(--p2dim);border:1px solid var(--p2);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--p2);display:none;}
.autoprog-box.show{display:block;}

/* SETS TABLE */
.sets-hdr{display:grid;grid-template-columns:30px 1fr 1fr 1fr 34px;gap:6px;font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.set-row{display:grid;grid-template-columns:30px 1fr 1fr 1fr 34px;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-lbl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text3);}
.si{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:6px 4px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--text);width:100%;text-align:center;-moz-appearance:textfield;transition:border-color .15s;}
.si::-webkit-outer-spin-button,.si::-webkit-inner-spin-button{-webkit-appearance:none;}
.si:focus{outline:none;border-color:var(--accent);}
.si.v{border-color:var(--p2);}
.ok-btn{width:30px;height:30px;border-radius:5px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text3);}
.ok-btn:hover{border-color:var(--p2);}
.ok-btn.done{background:var(--p2bg);border-color:var(--p2);color:var(--p2);}
.rest-bar{margin-top:10px;padding:7px 10px;background:var(--bg);border-radius:5px;border-left:2px solid var(--border2);font-size:11px;color:var(--text3);}

/* COMPACT VIEW */
.ex-compact{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
.ec-num{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--text3);width:16px;flex-shrink:0;}
.ec-name{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ec-sets{font-size:12px;color:var(--text2);flex-shrink:0;}
.ec-wt{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0;}

/* HISTORY */
.hist-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.clear-btn{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--red);cursor:pointer;transition:all .15s;}
.clear-btn:hover{background:var(--redbg);}
.hist-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.hist-tbl th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.hist-tbl td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;}
.hist-tbl tr:hover td{background:var(--surface2);}
.hist-empty{padding:60px;text-align:center;color:var(--text3);font-size:14px;}
.hist-note{font-size:11px;color:var(--text3);margin-top:3px;font-style:italic;}
.readiness-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.on{opacity:1;pointer-events:all;}

/* TIMER MODAL */
.timer-modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:90%;max-width:360px;text-align:center;}
.tm-ex{font-size:13px;color:var(--text2);margin-bottom:4px;}
.tm-set{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;margin-bottom:16px;}
.timer-ring{position:relative;width:140px;height:140px;margin:0 auto 16px;}
.timer-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.timer-ring circle{fill:none;}
.ring-bg{stroke:var(--border2);}
.ring-fill{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .3s;}
.timer-count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:var(--text);}
.timer-btns{display:flex;gap:10px;justify-content:center;margin-top:8px;}
.t-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;}
.t-start{background:var(--accent);color:var(--atxt);}.t-start:hover{background:var(--accent2);}
.t-skip{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.t-close{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.tm-progress{font-size:12px;color:var(--text3);margin-top:10px;}
.tm-restlabel{font-size:12px;color:var(--text3);margin-bottom:14px;}

/* YOUTUBE MODAL */
.yt-modal-inner{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:92%;max-width:480px;overflow:hidden;display:flex;flex-direction:column;}
.yt-mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.yt-mtitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.yt-mclose{width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;margin-left:10px;}
.yt-mclose:hover{background:var(--surface3);color:var(--text);}
.yt-embed-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;}
.yt-embed-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.yt-mbody{padding:12px 18px;}
.yt-open-ext{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;float:right;}
.yt-open-ext:hover{color:var(--text);}

/* PLATE CALC MODAL */
.plate-modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:92%;max-width:400px;overflow:hidden;}
.plate-mhd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);}
.plate-mtitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);}
.plate-mclose{width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.plate-mclose:hover{background:var(--surface3);}
.plate-mbody{padding:18px;}
.plate-target-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;}
.plate-target-label{font-size:13px;color:var(--text2);flex-shrink:0;}
.plate-target-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text);width:100px;text-align:center;-moz-appearance:textfield;}
.plate-target-input::-webkit-inner-spin-button,.plate-target-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.plate-target-input:focus{outline:none;border-color:var(--accent);}
.plate-calc-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:7px;border:none;background:var(--accent);color:var(--atxt);cursor:pointer;}
.plate-result{margin-top:4px;}
.plate-result-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px;}
.plate-side{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.plate-chip{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;padding:8px 12px;border-radius:8px;border:2px solid;white-space:nowrap;text-align:center;min-width:52px;}
.plate-chip.p45{background:rgba(255,50,50,.15);border-color:#ff3232;color:#ff5555;}
.plate-chip.p35{background:rgba(255,150,50,.15);border-color:#ff9632;color:#ffaa55;}
.plate-chip.p25{background:rgba(50,150,255,.15);border-color:#3296ff;color:#55aaff;}
.plate-chip.p10{background:rgba(50,200,50,.15);border-color:#32c832;color:#55dd55;}
.plate-chip.p5{background:rgba(200,200,50,.15);border-color:#c8c832;color:#dddd55;}
.plate-chip.p25s{background:rgba(150,100,255,.15);border-color:#9664ff;color:#aa88ff;}
.plate-chip.p125{background:rgba(180,180,180,.15);border-color:#aaa;color:#ccc;}
.plate-note{font-size:12px;color:var(--text3);margin-top:8px;}

/* SHARE MODAL */
.share-modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:92%;max-width:460px;overflow:hidden;}
.share-mhd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);}
.share-mtitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);}
.share-mclose{width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.share-mbody{padding:18px;}
.share-text{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--text2);resize:none;min-height:160px;line-height:1.6;}
.share-copy-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:var(--atxt);cursor:pointer;margin-top:12px;width:100%;}
.share-copy-btn:hover{background:var(--accent2);}

/* AUTH */
.auth-btn{font-family:"Barlow",sans-serif;font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.auth-btn:hover{border-color:var(--border2);color:var(--text);}
.auth-btn.signed-in{border-color:var(--p2);color:var(--p2);background:var(--p2bg);}
.auth-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;}
.sync-status{font-size:11px;color:var(--p2);padding:4px 10px;border-radius:5px;background:var(--p2bg);border:1px solid var(--p2);white-space:nowrap;display:none;}
.sync-status.show{display:inline-block;}
/* SIGN-IN SCREEN */
.signin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:20px;}
.signin-logo{font-family:"Barlow Condensed",sans-serif;font-size:64px;font-weight:900;color:var(--accent);letter-spacing:4px;text-transform:uppercase;}
.signin-logo span{color:var(--text3);font-weight:400;}
.signin-sub{font-size:15px;color:var(--text2);max-width:360px;line-height:1.6;}
.signin-btn{display:flex;align-items:center;gap:10px;font-family:"Barlow",sans-serif;font-size:15px;font-weight:600;padding:14px 28px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all .2s;}
.signin-btn:hover{border-color:var(--accent);color:var(--accent);}
.signin-btn svg{flex-shrink:0;}
.signin-note{font-size:12px;color:var(--text3);max-width:320px;line-height:1.6;}

/* ── WORKOUT DAY PICKER ── */
.day-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.day-picker-label{font-size:12px;color:var(--text3);font-weight:600;margin-right:4px;flex-shrink:0;}
.day-chip{font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;}
.day-chip.on{border-color:var(--p2);color:var(--p2);background:var(--p2bg);}
.day-chip:hover{border-color:var(--border2);color:var(--text);}

/* ── REP RANGE BADGE ── */
.rep-range-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle;}
.rep-range-badge.strength{background:rgba(255,150,64,.15);color:var(--p3);border:1px solid rgba(255,150,64,.3);}
.rep-range-badge.hypertrophy{background:var(--p1bg);color:var(--p1);border:1px solid rgba(74,158,255,.3);}
.rep-range-badge.endurance{background:var(--p2bg);color:var(--p2);border:1px solid rgba(47,216,138,.3);}
.rep-range-badge.cardio{background:var(--surface2);color:var(--text3);border:1px solid var(--border2);}

/* ── DELOAD BANNER ── */
.deload-banner{background:rgba(255,150,64,.1);border:1px solid var(--p3);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--p3);line-height:1.6;}
.deload-banner strong{font-weight:700;}

/* ── REST DAY CARD ── */
.rest-day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}
.rest-day-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.rest-suggestion{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.rest-chip{font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.rest-chip.active{border-color:var(--p2);color:var(--p2);background:var(--p2bg);}
.rest-chip.warn{border-color:var(--p3);color:var(--p3);background:rgba(255,150,64,.08);}

/* ── PHASE ASSESSMENT ── */
.assessment-modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:92%;max-width:560px;max-height:88vh;overflow-y:auto;}
.assessment-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.assessment-title{font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.assessment-close{width:32px;height:32px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.assessment-body{padding:20px;}
.assess-section{margin-bottom:20px;}
.assess-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.assess-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.assess-ex-name{font-size:13px;font-weight:600;flex:1;min-width:120px;}
.assess-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:800;color:var(--text);width:80px;text-align:center;-moz-appearance:textfield;}
.assess-input::-webkit-inner-spin-button,.assess-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.assess-input:focus{outline:none;border-color:var(--accent);}
.assess-vs{font-size:11px;color:var(--text3);white-space:nowrap;}
.assess-delta{font-size:13px;font-weight:700;min-width:60px;}
.assess-delta.pos{color:var(--p2);}.assess-delta.neg{color:var(--red);}.assess-delta.neu{color:var(--text3);}
.assess-save-btn{width:100%;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:12px;border-radius:8px;border:none;background:var(--accent);color:var(--atxt);cursor:pointer;margin-top:8px;}
.assess-save-btn:hover{background:var(--accent2);}

/* ── STRENGTH COMPARISON ── */
.strength-comp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}
.comp-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;}
.comp-table th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);}
.comp-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
.comp-table tr:last-child td{border-bottom:none;}
.comp-table tr:hover td{background:var(--surface2);}
.comp-ex{font-weight:600;color:var(--text);}
.comp-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:3px;width:100%;}
.comp-bar{height:100%;border-radius:3px;background:var(--p2);transition:width .6s;}
.comp-pct{font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:800;}
.comp-pct.pos{color:var(--p2);}.comp-pct.neg{color:var(--red);}.comp-pct.neu{color:var(--text3);}

/* ── BODY COMP ── */
.bodycomp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:20px;}
.bodycomp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.bc-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.bc-val{font-family:"Barlow Condensed",sans-serif;font-size:26px;font-weight:800;margin-bottom:2px;}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, onSnapshot }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const fbConfig = {
  apiKey: "AIzaSyCp5wqtqtZ_INdRBBBlU0bP0XQcMIxP9Zk",
  authDomain: "lift12-830c6.firebaseapp.com",
  projectId: "lift12-830c6",
  storageBucket: "lift12-830c6.firebasestorage.app",
  messagingSenderId: "571010282495",
  appId: "1:571010282495:web:dd42ddd2ef517c03cdedca"
};
const fbApp  = initializeApp(fbConfig);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);
const provider = new GoogleAuthProvider();

let _uid = null;
let _syncUnsubscribe = null;

// Expose to global scope so non-module JS can call them
window.fbSignIn = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) { alert('Sign-in failed: ' + e.message); }
};
window.fbSignOut = async () => {
  if(_syncUnsubscribe){ _syncUnsubscribe(); _syncUnsubscribe=null; }
  await signOut(auth);
  _uid = null;
  window.updateAuthUI(null);
};
window.fbSave = async (data) => {
  if(!_uid) return;
  try {
    await setDoc(doc(db,'users',_uid,'data','progress'), { payload: JSON.stringify(data), ts: Date.now() });
  } catch(e) { console.warn('Firebase save failed:', e); }
};

// Listen for auth state
onAuthStateChanged(auth, async (user) => {
  if(user){
    _uid = user.uid;
    window.updateAuthUI(user);
    // Load data once, then set up real-time listener
    const snap = await getDoc(doc(db,'users',_uid,'data','progress'));
    if(snap.exists()){
      try {
        const incoming = JSON.parse(snap.data().payload);
        const def = JSON.parse(JSON.stringify(window.DEFAULT_STATE));
        window.S = Object.assign(def, incoming);
        window.renderHome();
      } catch(e) { console.warn('Load error:', e); }
    }
    // Real-time sync: update if another device saves
    if(_syncUnsubscribe) _syncUnsubscribe();
    _syncUnsubscribe = onSnapshot(doc(db,'users',_uid,'data','progress'), (snap) => {
      if(!snap.exists() || snap.metadata.hasPendingWrites) return;
      try {
        const incoming = JSON.parse(snap.data().payload);
        const def = JSON.parse(JSON.stringify(window.DEFAULT_STATE));
        window.S = Object.assign(def, incoming);
        window.renderSyncStatus('Synced just now ✓');
        // Refresh current view
        if(document.getElementById('v-home').classList.contains('on')) window.renderHome();
      } catch(e){}
    });
  } else {
    _uid = null;
    window.updateAuthUI(null);
  }
});
</script>

// ═══════════════════════════════════════════════════ 1RM (Epley)
function epley1RM(weight,reps){
  if(!weight||!reps||reps<1)return 0;
  if(reps===1)return weight;
  return Math.round(weight*(1+reps/30));
}


// ═══════════════════════════════════════════════════ REP RANGE GUIDANCE
function getRepRange(reps){
  const r=parseInt(reps)||0;
  if(r===0)return null;
  if(r<=3)return{label:'Strength',cls:'strength',desc:'1–3 reps = max strength'};
  if(r<=5)return{label:'Strength',cls:'strength',desc:'4–5 reps = strength'};
  if(r<=8)return{label:'Hypertrophy',cls:'hypertrophy',desc:'6–8 reps = strength/hypertrophy'};
  if(r<=12)return{label:'Hypertrophy',cls:'hypertrophy',desc:'8–12 reps = muscle building'};
  if(r<=20)return{label:'Endurance',cls:'endurance',desc:'13–20 reps = muscular endurance'};
  return{label:'Endurance',cls:'endurance',desc:'20+ reps = endurance'};
}

function calcStreak(){
  let s=0;
  for(const ph of PHASES)for(const w of ph.weeks){
    if(ph.days.every((_,di)=>S.completed[wk(ph.id,w,di)]||S.skipped[wk(ph.id,w,di)]))s++;
    else return s;
  }
  return s;
}

// ═══════════════════════════════════════════════════ AUTO-PROGRESSION
function getProgression(ph,week,di,key){
  // find previous matching day
  const allWeeks=[];
  PHASES.forEach(p=>p.weeks.forEach(w=>p.days.forEach((_,d)=>allWeeks.push({pid:p.id,w,di:d,key:wk(p.id,w,d)}))));
  const curIdx=allWeeks.findIndex(e=>e.key===key);
  let prevKey=null;
  for(let i=curIdx-1;i>=0;i--){
    if(allWeeks[i].di===di&&S.completed[allWeeks[i].key]){prevKey=allWeeks[i].key;break;}
  }
  if(!prevKey)return null;
  const prevPh=ph_(allWeeks.find(e=>e.key===prevKey).pid);
  const results=[];
  ph.days[di].exercises.forEach((ex,ei)=>{
    const ek=`${prevKey}_e${ei}`;
    const sets=S.sets[ek]||[];
    const completedSets=sets.filter(s=>s.done||(s.reps&&parseInt(s.reps)>0));
    if(!completedSets.length)return;
    const allRepsHit=completedSets.every(s=>parseInt(s.reps)>=parseInt(ex.p.match(/\d+/)?.[0]||0));
    const maxW=Math.max(...sets.map(s=>parseFloat(s.weight)||0).filter(v=>v>0));
    if(maxW>0){
      results.push({name:ex.name,prevW:maxW,suggested:allRepsHit?maxW+5:maxW,allRepsHit});
    }
  });
  return results.length?results:null;
}


// ═══════════════════════════════════════════════════ DELOAD DETECTION
function getDeloadInfo(){
  // After every 4 completed weeks suggest a deload
  const completedWeeks=[];
  PHASES.forEach(ph=>ph.weeks.forEach(w=>{
    if(ph.days.every((_,di)=>S.completed[wk(ph.id,w,di)]||S.skipped[wk(ph.id,w,di)]))
      completedWeeks.push({pid:ph.id,w});
  }));
  if(completedWeeks.length>0&&completedWeeks.length%4===0){
    // Check if current week (next incomplete) is a deload candidate
    const nextIncomplete=getNexIncompleteWeek();
    if(nextIncomplete)return{suggest:true,completedCount:completedWeeks.length,next:nextIncomplete};
  }
  return null;
}
function getNexIncompleteWeek(){
  for(const ph of PHASES)for(const w of ph.weeks){
    if(!ph.days.every((_,di)=>S.completed[wk(ph.id,w,di)]||S.skipped[wk(ph.id,w,di)]))
      return{pid:ph.id,w};
  }
  return null;
}

// ═══════════════════════════════════════════════════ REST DAY SUGGESTIONS
function getRestDaySuggestion(){
  // Look at recent workout days and suggest optimal rest
  const recentKeys=Object.keys(S.completed).filter(k=>S.completed[k]).slice(-4);
  if(!recentKeys.length)return null;
  // Get days of week trained (from workoutDays log)
  const daysThisWeek=Object.entries(S.workoutDays||{})
    .filter(([k,v])=>v)
    .map(([k,v])=>v)
    .flat()
    .filter(Boolean);
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const today=new Date().getDay();
  // Figure out which muscle groups were trained last 2 sessions
  const lastTwo=recentKeys.slice(-2).map(k=>{
    const m=k.match(/p(\d+)_w(\d+)_d(\d+)/);
    if(!m)return null;
    const ph=ph_(parseInt(m[1]));
    return ph?ph.days[parseInt(m[3])].title:null;
  }).filter(Boolean);
  // Simple fatigue model
  const hasLower=lastTwo.some(t=>t.toLowerCase().includes('lower')||t.toLowerCase().includes('full'));
  const hasUpper=lastTwo.some(t=>t.toLowerCase().includes('push')||t.toLowerCase().includes('pull')||t.toLowerCase().includes('upper'));
  let suggestions=[];
  if(hasLower&&hasUpper)suggestions.push({text:'Full rest recommended',warn:true});
  else if(hasLower)suggestions.push({text:'Upper body OK today',warn:false});
  else if(hasUpper)suggestions.push({text:'Lower body OK today',warn:false});
  if(recentKeys.length>=3)suggestions.push({text:'Consider a rest day soon',warn:true});
  return suggestions.length?suggestions:null;
}

// ═══════════════════════════════════════════════════ PROJECTED FINISH
function getProjectedFinish(){
  const total=PHASES.reduce((a,p)=>a+p.weeks.length*p.days.length,0);
  const done=Object.values(S.completed).filter(Boolean).length;
  if(done<3)return null;
  // Use history to get pace (sessions per week)
  const hist=S.history.slice(0,8);
  if(hist.length<2)return null;
  // Simple: sessions done / weeks elapsed
  const remaining=total-done;
  const sessionsPerWeek=done/Math.max(calcStreak(),1);
  const weeksLeft=Math.ceil(remaining/Math.max(sessionsPerWeek,1));
  const finishDate=new Date();
  finishDate.setDate(finishDate.getDate()+weeksLeft*7);
  return{
    date:finishDate.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),
    weeksLeft,
    pace:sessionsPerWeek.toFixed(1)
  };
}

// ═══════════════════════════════════════════════════ BODY COMPOSITION ESTIMATE
function getBodyCompEstimate(){
  const currentBW=S.bodyweight.length?S.bodyweight[S.bodyweight.length-1].w:S.startWeight||202;
  const startBW=S.startWeight||202;
  const startBF=S.startBF||22; // 20-25% midpoint
  const startFatLbs=startBW*(startBF/100);
  const startMuscleLbs=startBW-startFatLbs;
  // Estimate: each lb of body weight lost assumed to be 75% fat, 25% muscle when in deficit
  // Each week of training adds ~0.25–0.5 lbs muscle (beginner rate)
  const done=Object.values(S.completed).filter(Boolean).length;
  const weeksTraining=Math.min(done/3,12); // approx
  const bwChange=currentBW-startBW;
  const estimatedMuscleGained=Math.min(weeksTraining*0.35,4); // cap at 4 lbs over 12 weeks
  const estimatedFatLost=Math.max(0,-bwChange+estimatedMuscleGained);
  const currentFatLbs=Math.max(startFatLbs-estimatedFatLost,0);
  const currentMuscleLbs=startMuscleLbs+estimatedMuscleGained;
  const currentBF=Math.max(((currentFatLbs/currentBW)*100),8).toFixed(1);
  return{
    currentBW:currentBW.toFixed(1),
    currentBF,
    currentMuscleLbs:currentMuscleLbs.toFixed(1),
    currentFatLbs:currentFatLbs.toFixed(1),
    estimatedMuscleGained:estimatedMuscleGained.toFixed(1),
    estimatedFatLost:estimatedFatLost.toFixed(1),
    weeksTraining:Math.round(weeksTraining)
  };
}

function getStrengthComparison(){

  keyLifts.forEach(name=>{
    let week1W=null,latestW=null,latestDate='';
    PHASES.forEach(ph=>ph.weeks.forEach(w=>ph.days.forEach((day,di)=>{
      const key=wk(ph.id,w,di);
      if(!S.completed[key])return;
      day.exercises.forEach((ex,ei)=>{
        if(ex.name!==name)return;
        const ek=`${key}_e${ei}`;
        const wts=(S.sets[ek]||[]).map(s=>parseFloat(s.weight||s.reps||0)).filter(v=>v>0);
        if(!wts.length)return;
        const maxW=Math.max(...wts);
        if(week1W===null)week1W=maxW;
        latestW=maxW;
        const he=S.history.find(h=>h.key===key);
        if(he)latestDate=he.date;
      });
    })));
    if(week1W!==null&&latestW!==null){
      const delta=latestW-week1W;
      const pct=week1W>0?Math.round((delta/week1W)*100):0;
      results.push({name,week1W,latestW,delta,pct,latestDate});
    }
  });
  return results;
}

// ═══════════════════════════════════════════════════ CHARTS
function getExHistory(exName){
  const res=[];
  PHASES.forEach(ph=>ph.weeks.forEach(w=>ph.days.forEach((day,di)=>{
    const key=wk(ph.id,w,di);
    if(!S.completed[key])return;
    day.exercises.forEach((ex,ei)=>{
      if(ex.name!==exName)return;
      const ek=`${key}_e${ei}`;
      const wts=(S.sets[ek]||[]).map(s=>parseFloat(s.weight)).filter(v=>!isNaN(v)&&v>0);
      if(wts.length){const he=S.history.find(h=>h.key===key);res.push({w:Math.max(...wts),date:he?he.date:`Wk ${w}`,week:w});}
    });
  })));
  return res;
}
function renderChart(){
  const el=document.getElementById('chart-section');if(!el)return;
  const exNames=[];
  PHASES.forEach(ph=>ph.days.forEach(d=>d.exercises.forEach(ex=>{if(!exNames.includes(ex.name))exNames.push(ex.name);})));

      ${exNames.map(n=>`<option value="${n}"${n===def?' selected':''}>${n}</option>`).join('')}
    </select>

    <div class="chart-empty" id="chart-empty" style="display:none">No weight data logged for this exercise yet.</div>
  `;

function drawProgressChart(exName){
  const data=getExHistory(exName);
  const empty=document.getElementById('chart-empty');
  const canvas=document.getElementById('prog-chart');
  if(!canvas)return;
  if(!data.length){canvas.style.display='none';if(empty)empty.style.display='block';return;}
  if(empty)empty.style.display='none';canvas.style.display='block';
  drawCanvas('prog-chart',data.map(d=>d.w),data.map(d=>d.date),'var(--accent)',true);
}
function drawCanvas(id,vals,labels,color,showGoal=false){
  const canvas=document.getElementById(id);if(!canvas||vals.length<1)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*2;canvas.height=canvas.height*2||320;
  const cw=canvas.width,ch=canvas.height,pad=50;
  const min=Math.max(0,Math.min(...vals)-10),max=Math.max(...vals)+10;
  const xp=i=>pad+(i/Math.max(vals.length-1,1))*(cw-pad*2);
  const yp=v=>ch-pad-((v-min)/(max-min||1))*(ch-pad*2);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const gridC=dark?'#2a2d35':'#dde0e8';
  const textC=dark?'#5c6070':'#9499a8';
  ctx.clearRect(0,0,cw,ch);
  [0,.25,.5,.75,1].forEach(t=>{
    const yy=yp(min+(max-min)*t);
    ctx.strokeStyle=gridC;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(cw-pad,yy);ctx.stroke();
    ctx.fillStyle=textC;ctx.font='22px Barlow,sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(min+(max-min)*t)+'lb',pad-8,yy+7);
  });
  if(vals.length>1){
    ctx.beginPath();ctx.moveTo(xp(0),yp(vals[0]));
    vals.forEach((v,i)=>ctx.lineTo(xp(i),yp(v)));
    ctx.lineTo(xp(vals.length-1),ch-pad);ctx.lineTo(xp(0),ch-pad);ctx.closePath();
    ctx.fillStyle=dark?'rgba(232,255,71,.05)':'rgba(90,138,0,.05)';ctx.fill();
  }
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=4;ctx.lineJoin='round';
  vals.forEach((v,i)=>i===0?ctx.moveTo(xp(i),yp(v)):ctx.lineTo(xp(i),yp(v)));ctx.stroke();
  vals.forEach((v,i)=>{
    ctx.beginPath();ctx.arc(xp(i),yp(v),7,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.fillStyle=textC;ctx.font='22px Barlow,sans-serif';ctx.textAlign='center';
    ctx.fillText(labels[i],xp(i),ch-8);
  });
}

function getSuggestedWeight(ek,ex){
  // parse session key from ek: p1_w1_d0_e0
  const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m)return null;
  const pid=parseInt(m[1]),w=parseInt(m[2]),di=parseInt(m[3]),ei=parseInt(m[4]);
  // find prev matching session
  const allWeeks=[];
  PHASES.forEach(p=>p.weeks.forEach(ww=>p.days.forEach((_,d)=>allWeeks.push({pid:p.id,w:ww,di:d,key:wk(p.id,ww,d)}))));
  const curIdx=allWeeks.findIndex(e=>e.pid===pid&&e.w===w&&e.di===di);
  for(let i=curIdx-1;i>=0;i--){
    const prev=allWeeks[i];
    if(prev.di===di&&S.completed[prev.key]){
      const prevEk=`${prev.key}_e${ei}`;
      const sets=S.sets[prevEk]||[];
      const maxW=Math.max(...sets.map(s=>parseFloat(s.weight)||0).filter(v=>v>0));
      if(maxW>0){
        const allHit=sets.filter(s=>s.done||(s.reps&&parseInt(s.reps)>0)).every(s=>parseInt(s.reps)>=parseInt(ex.p.match(/\d+/)?.[0]||0));
        return allHit?maxW+5:maxW;
      }
    }
  }
  return null;
}

function isBarbell(name){return name.toLowerCase().includes('barbell')||name.toLowerCase().includes('deadlift')||name.toLowerCase().includes('squat');}

function toggleWarmup(ek,workingW){
  const el=document.getElementById(`wu-${ek}`);if(!el)return;
  if(el.classList.contains('show')){el.classList.remove('show');return;}
  const sets=calcWarmupSets(workingW);
  el.innerHTML=`<div class="warmup-title">Warm-up Sets (before working sets)</div><div class="warmup-row">${sets.map(s=>`<div class="warmup-set">${s.weight} lbs × ${s.reps}</div>`).join('')}</div>`;
  el.classList.add('show');
}
function calcWarmupSets(w){
  const bar=45;
  if(w<=bar+10)return[];
  const sets=[];
  sets.push({weight:bar,reps:10});
  const pcts=[.5,.6,.75,.9];
  pcts.forEach(p=>{
    const raw=Math.round(w*p/5)*5;
    if(raw>bar&&raw<w)sets.push({weight:raw,reps:p<.6?5:p<.75?3:1});
  });
  return sets;
}

function getPrevSetData(ek){
  // find previous matching exercise key
  const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m)return[];
  const pid=parseInt(m[1]),w=parseInt(m[2]),di=parseInt(m[3]),ei=parseInt(m[4]);
  const allWeeks=[];
  PHASES.forEach(p=>p.weeks.forEach(ww=>p.days.forEach((_,d)=>allWeeks.push({pid:p.id,w:ww,di:d,key:wk(p.id,ww,d)}))));
  const curIdx=allWeeks.findIndex(e=>e.pid===pid&&e.w===w&&e.di===di);
  for(let i=curIdx-1;i>=0;i--){
    const prev=allWeeks[i];
    if(prev.di===di&&S.completed[prev.key]){
      return S.sets[`${prev.key}_e${ei}`]||[];
    }
  }
  return[];
}

function renderSetRows(ex,ek){
  const c=document.getElementById(`sr-${ek}`);if(!c)return;
  const sets=S.sets[ek]||[];
  const prevSets=getPrevSetData(ek);
  const et=getExType(ex.name);
  const isWeight=et.type==='weight';
  const isTime=et.type==='time';
  const isIntervals=et.type==='intervals';
  const isReps=et.type==='reps';
  // Build header labels based on type
  let col1='', col2='', col3='';
  if(isWeight){col1='Reps done';col2='Weight used';col3='Notes';}
  else if(isTime){col1='Duration';col2='';col3='Notes';}
  else if(isIntervals){col1='Rounds';col2='Effort';col3='Notes';}
  else{col1='Reps / Rounds';col2='';col3='Notes';}
  // Update header
  const hdrEl=c.previousElementSibling;
  if(hdrEl&&hdrEl.classList.contains('sets-hdr')){
    hdrEl.innerHTML=`<span>Set</span><span>${col1}</span>${col2?`<span>${col2}</span>`:'<span></span>'}<span>${col3}</span><span></span>`;
  }
  c.innerHTML=sets.map((s,si)=>{
    if(isWeight){
      const ps=prevSets[si]||null;
      const prevRepsHint=ps&&ps.reps?`<div class="prev-val">prev: ${ps.reps}</div>`:'';
      const prevWtHint=ps&&ps.weight?`<div class="prev-val">prev: ${ps.weight}</div>`:'';
      return`<div class="set-row">
        <div class="set-lbl">S${si+1}</div>
        <div style="display:flex;flex-direction:column">
          <input class="si${s.reps?' v':''}" type="number" min="0" inputmode="numeric" placeholder="reps"
            value="${s.reps||''}" id="r-${ek}-${si}" onchange="upd('${ek}',${si},'reps',this.value)"/>
          ${prevRepsHint}
        </div>
        <div style="display:flex;flex-direction:column">
          <input class="si${s.weight?' v':''}" type="text" inputmode="decimal" placeholder="lbs / BW"
            value="${s.weight||''}" id="wt-${ek}-${si}" onchange="upd('${ek}',${si},'weight',this.value)"/>
          ${prevWtHint}
        </div>
        <input class="si${s.notes?' v':''}" type="text" placeholder="notes"
          value="${s.notes||''}" id="nt-${ek}-${si}" onchange="upd('${ek}',${si},'notes',this.value)"/>
        <button class="ok-btn${s.done?' done':''}" id="ob-${ek}-${si}" onclick="togSet('${ek}',${si})">${s.done?'✓':'○'}</button>
      </div>`;
    } else if(isTime){
      // time-based: duration field + notes, no weight
      const unitOpts=['seconds','mins'].map(u=>`<option value="${u}"${(s.timeUnit||et.unit)===u?' selected':''}>${u}</option>`).join('');
      return`<div class="set-row" style="grid-template-columns:30px 1fr auto 1fr 34px">
        <div class="set-lbl">S${si+1}</div>
        <input class="si${s.duration?' v':''}" type="number" min="0" inputmode="numeric" placeholder="${et.unit}"
          value="${s.duration||''}" id="r-${ek}-${si}" onchange="upd('${ek}',${si},'duration',this.value)"/>
        <select class="si" style="width:80px;padding:5px 4px" id="u-${ek}-${si}" onchange="upd('${ek}',${si},'timeUnit',this.value)">
          ${unitOpts}
        </select>
        <input class="si${s.notes?' v':''}" type="text" placeholder="notes"
          value="${s.notes||''}" id="nt-${ek}-${si}" onchange="upd('${ek}',${si},'notes',this.value)"/>
        <button class="ok-btn${s.done?' done':''}" id="ob-${ek}-${si}" onclick="togSet('${ek}',${si})">${s.done?'✓':'○'}</button>
      </div>`;
    } else if(isIntervals){
      // intervals: rounds + effort dropdown + notes
      const effortOpts=['','Easy','Moderate','Hard','Max'].map(e=>`<option value="${e}"${(s.effort||'')=== e?' selected':''}>${e||'Effort'}</option>`).join('');
      return`<div class="set-row">
        <div class="set-lbl">S${si+1}</div>
        <input class="si${s.reps?' v':''}" type="number" min="0" inputmode="numeric" placeholder="rounds"
          value="${s.reps||''}" id="r-${ek}-${si}" onchange="upd('${ek}',${si},'reps',this.value)"/>
        <select class="si" id="wt-${ek}-${si}" onchange="upd('${ek}',${si},'effort',this.value)">
          ${effortOpts}
        </select>
        <input class="si${s.notes?' v':''}" type="text" placeholder="notes"
          value="${s.notes||''}" id="nt-${ek}-${si}" onchange="upd('${ek}',${si},'notes',this.value)"/>
        <button class="ok-btn${s.done?' done':''}" id="ob-${ek}-${si}" onclick="togSet('${ek}',${si})">${s.done?'✓':'○'}</button>
      </div>`;
    } else {

      return`<div class="set-row" style="grid-template-columns:30px 1fr 1fr 34px">
        <div class="set-lbl">S${si+1}</div>

function upd(ek,si,field,val){
  if(!S.sets[ek])return;
  S.sets[ek][si][field]=val;
  const ids={reps:`r-${ek}-${si}`,weight:`wt-${ek}-${si}`,notes:`nt-${ek}-${si}`};
  const inp=document.getElementById(ids[field]);if(inp)inp.classList.toggle('v',!!val);
  // PR detection moved to togSet — only fires when set is explicitly marked done
  save();
}
function togSet(ek,si){
  if(!S.sets[ek])return;
  S.sets[ek][si].done=!S.sets[ek][si].done;
  const btn=document.getElementById(`ob-${ek}-${si}`);
  if(btn){btn.classList.toggle('done',S.sets[ek][si].done);btn.textContent=S.sets[ek][si].done?'✓':'○';}
  // PR detection: only runs when marking SET as DONE (not on typing)
  if(S.sets[ek][si].done){
    const s=S.sets[ek][si];
    const weight=parseFloat(s.weight||0);
    if(weight>0){
      const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
      if(m){
        const ph=ph_(parseInt(m[1]));
        const ex=ph&&ph.days[parseInt(m[3])]?.exercises[parseInt(m[4])];
        const now=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        if(ex&&detectPR(ex.name,weight,s.reps,now))toast(`🏆 New PR on ${ex.name}! ${weight} lbs`);
      }
    }
  }
  // auto-start corner timer
  if(S.sets[ek][si].done) startCornerTimer();
  // haptic on mobile
  if(navigator.vibrate)navigator.vibrate(40);
  // update ql display if open
  qlSyncOkBtn(ek,si);
  save();
}

// ═══════════════════════════════════════════════════ COMPLETE / SKIP
function toggleDone(ph,week,di,key){
  const was=!!S.completed[key];S.completed[key]=!was;
  if(S.skipped[key])S.skipped[key]=false;
  if(!was){
    const day=ph.days[di];let ts=0,tr=0;
    Object.keys(S.sets).filter(k=>k.startsWith(key+'_e')).forEach(ek=>{(S.sets[ek]||[]).forEach(s=>{if(s.reps||s.done){ts++;tr+=parseInt(s.reps)||0;}});});
    const note=S.sessionNotes[key]||'';
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const readiness=S.readiness[today]||null;
    S.history=S.history.filter(h=>h.key!==key);
    const trainedDay=(S.workoutDays&&S.workoutDays[key])||new Date().toLocaleDateString('en-US',{weekday:'short'});
    S.history.unshift({key,date:today,phase:ph.label,phaseColor:ph.color,week,day:ph.days[di].name,title:ph.days[di].title,ts,tr,note,readiness,trainedDay});
    toast('Workout logged! 💪');
    // check new achievements
    setTimeout(()=>checkNewAchievements(),100);
  }
  save();
  const mb=document.getElementById(`mb-${key}`),sb=document.getElementById(`sb-${key}`),hd=document.getElementById(`dshd-${key}`);
  if(mb){mb.textContent=S.completed[key]?'✓ Completed':'Mark Complete';mb.classList.toggle('done',!!S.completed[key]);mb.classList.toggle('primary',!S.completed[key]);}
  if(sb){sb.textContent='Skip Session';sb.classList.remove('skipped');}
  if(hd){hd.classList.toggle('done',!!S.completed[key]);hd.classList.remove('skipped');}
}
function toggleSkip(ph,week,di,key){
  const was=!!S.skipped[key];S.skipped[key]=!was;
  if(S.completed[key])S.completed[key]=false;save();
  const sb=document.getElementById(`sb-${key}`),mb=document.getElementById(`mb-${key}`),hd=document.getElementById(`dshd-${key}`);
  if(sb){sb.textContent=S.skipped[key]?'↩ Unskip':'Skip Session';sb.classList.toggle('skipped',!!S.skipped[key]);}
  if(mb){mb.textContent='Mark Complete';mb.classList.remove('done');mb.classList.add('primary');}
  if(hd){hd.classList.toggle('skipped',!!S.skipped[key]);hd.classList.remove('done');}
  if(S.skipped[key])toast('Session marked as skipped');
}

// ═══════════════════════════════════════════════════ COPY LAST
function copyLast(ph,week,di,key){
  const allWeeks=[];
  PHASES.forEach(p=>p.weeks.forEach(w=>p.days.forEach((_,d)=>allWeeks.push({pid:p.id,w,di:d,key:wk(p.id,w,d)}))));
  const curIdx=allWeeks.findIndex(e=>e.key===key);
  for(let i=curIdx-1;i>=0;i--){
    const prev=allWeeks[i];
    if(prev.di===di&&S.completed[prev.key]){
      const prevPh=ph_(prev.pid);let copied=0;
      prevPh.days[di].exercises.forEach((ex,ei)=>{
        const prevEk=`${prev.key}_e${ei}`,curEk=`${key}_e${ei}`;
        const ps=S.sets[prevEk]||[];
        if(!S.sets[curEk])S.sets[curEk]=Array.from({length:ex.sets},()=>({reps:'',weight:'',notes:'',done:false}));
        ps.forEach((s,si)=>{if(s.weight&&S.sets[curEk][si]){S.sets[curEk][si].weight=s.weight;copied++;}});
      });
      save();
      ph.days[di].exercises.forEach((ex,ei)=>renderSetRows(ex,`${key}_e${ei}`));
      toast(copied>0?`Copied ${copied} weights from previous session ✓`:'No weights found in previous session');
      return;
    }
  }
  toast('No previous matching session found');
}

  let text=`🏋️ LIFT12 — ${ph.label} Week ${week} · ${day.name}: ${day.title}\n`;

  day.exercises.forEach((ex,ei)=>{
    const ek=`${key}_e${ei}`;

    const logged=sets.filter(s=>s.reps||s.weight);
    text+=`${ei+1}. ${ex.name} (${ex.p} @ ${ex.w})\n`;
    if(logged.length)logged.forEach((s,si)=>{if(s.reps||s.weight)text+=`   S${si+1}: ${s.reps||'?'} reps @ ${s.weight||'?'} lbs\n`;});
    text+='\n';
  });

}

let timerInterval=null,timerRemaining=90,timerTotal=90,timerRunning=false;
function openTimer(day,restSec){

function timerToggle(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('tm-playbtn').textContent='Resume';}
  else{
    if(timerRemaining<=0){timerRemaining=timerTotal;}
    timerRunning=true;document.getElementById('tm-playbtn').textContent='Pause';

      timerRemaining--;
      document.getElementById('tm-count').textContent=timerRemaining;
      updateTimerRing(timerRemaining,timerTotal);
      document.getElementById('tm-progress').textContent=`${timerTotal-timerRemaining}s elapsed`;
      if(timerRemaining<=0){

        document.getElementById('tm-set').textContent='✓ Rest complete — next set!';

function updateTimerRing(rem,total){
  const circ=2*Math.PI*60,offset=circ*(1-rem/total);
  const ring=document.getElementById('tm-ring');
  ring.setAttribute('stroke-dasharray',circ.toFixed(1));
  ring.setAttribute('stroke-dashoffset',offset.toFixed(1));
  ring.style.stroke=rem<=10?'var(--red)':rem<=30?'var(--p3)':'var(--accent)';
}

function openPlateCalc(){
  document.getElementById('plate-modal').classList.add('on');
  document.body.style.overflow='hidden';
  calcPlates();
}
function closePlateCalc(){document.getElementById('plate-modal').classList.remove('on');document.body.style.overflow='';}
function plateBgClick(e){if(e.target===document.getElementById('plate-modal'))closePlateCalc();}
function calcPlates(){
  const target=parseFloat(document.getElementById('plate-target').value)||135;
  const bar=45;
  const perSide=(target-bar)/2;
  const available=[45,35,25,10,5,2.5,1.25];
  const classes={45:'p45',35:'p35',25:'p25',10:'p10',5:'p5',2.5:'p25s',1.25:'p125'};
  let rem=perSide,plates=[];
  available.forEach(p=>{while(rem>=p-0.001){rem=Math.round((rem-p)*100)/100;plates.push(p);}});
  const el=document.getElementById('plate-result');
  if(perSide<0){el.innerHTML='<div style="color:var(--red);font-size:13px">Weight must be at least 45 lbs (bar only)</div>';return;}
  if(rem>0.01){el.innerHTML='<div style="color:var(--text3);font-size:13px">Cannot be loaded exactly with standard plates</div>';return;}
  // group plates
  const grouped={};plates.forEach(p=>{grouped[p]=(grouped[p]||0)+1;});
  const chips=Object.entries(grouped).sort((a,b)=>b[0]-a[0]).map(([p,n])=>`<div class="plate-chip ${classes[p]||'p5'}">${n>1?n+'×':''}${p}</div>`).join('');
  el.innerHTML=`
    <div class="plate-result-title">Each side of the bar:</div>
    <div class="plate-side">${chips}</div>
    <div class="plate-note">Bar: 45 lbs + ${perSide} lbs each side = ${target} lbs total</div>
  `;
}

function importFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const incoming=parsed.data||parsed;
      if(!incoming.sets||!incoming.completed||!incoming.history){alert('Not a valid LIFT12 backup.');return;}
      const ed=Object.values(S.completed).filter(Boolean).length;
      const id=Object.values(incoming.completed).filter(Boolean).length;
      if(!confirm(`Import backup?\n\nFile: ${id} sessions, ${incoming.history.length} history entries.\nThis device: ${ed} sessions.\n\nThis will replace your current data.`))return;
      S=Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)),incoming);
      save();go('home');toast(`Imported! ${id} sessions loaded ✓`);
    }catch(err){alert('Could not read file.');}
  };
  reader.readAsText(file);
}
