<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LIFT12 — AI Coach & Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

/* ── EXISTING THEME ── */
:root{
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--surface3:#242830;
  --border:#2a2d35;--border2:#363a45;
  --text:#e8eaf0;--text2:#9499a8;--text3:#5c6070;
  --accent:#e8ff47;--accent2:#b8d400;--atxt:#000;
  --p1:#4a9eff;--p1bg:#0d2140;--p2:#2fd88a;--p2bg:#0b2c1e;--p3:#ff9640;--p3bg:#2a1800;
  --red:#ff4f4f;--redbg:rgba(255,79,79,.1);--gold:#ffd700;--goldbg:rgba(255,215,0,.1);
  --r:10px;
}

/* ── NEW: AI SUGGESTION STYLES ── */
.ai-suggestion-box {
  background: var(--surface3);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: slideIn 0.3s ease-out;
}
.ai-icon { font-size: 20px; }
.ai-text { font-size: 12px; line-height: 1.4; color: var(--text); }
.ai-text strong { color: var(--accent); font-weight: 800; }

@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── NEW: COLLAPSIBLE INSTRUCTIONS ── */
.instr-toggle {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  transition: color 0.2s;
}
.instr-toggle:hover { color: var(--accent); }
.instr-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease-out;
  background: var(--bg);
  border-radius: 8px;
}
.instr-content.open {
  max-height: 1000px;
  margin-top: 10px;
  padding: 12px;
  border: 1px solid var(--border);
}
.instr-gif {
  width: 100%;
  border-radius: 6px;
  margin-bottom: 12px;
  background: var(--surface2);
  min-height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 11px;
}
.instr-list {
  padding-left: 18px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
}
.instr-list li { margin-bottom: 6px; }

/* ... (Keep your existing styles here) ... */
</style>
</head>
<body>

<div id="app-root"></div>

<script>
/* ── NEW: GIF MAPPING ── */
// Add your GIF URLs here. If a name isn't here, it shows a placeholder.
const GIF_MAP = {
  'Barbell back squat': 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZzZqZzZqZzZqZzZqZzZqZzZqZzZqZzZqZzZqZzZqJmRsaT0x/3o7TKMGpxxSAtYp396/giphy.gif',
  'Barbell bench press': 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZzZqZzZqZzZqZzZqZzZqZzZqZzZqZzZqZzZqJmRsaT0x/l0HlJDa8eqoTCV0Yk/giphy.gif',
  // Add more as needed...
};

/* ── NEW: AI PROGRESSION LOGIC ── */
function getAIProgression(sessionKey, exIdx) {
  const entry = log[sessionKey];
  if (!entry) return null;
  const ex = entry.exs[exIdx];
  
  // Only suggest if all sets are done
  if (!ex.sets.every(s => s.done)) return null;

  // Find max weight and avg RPE
  let maxW = 0;
  let avgRPE = 0;
  let count = 0;

  ex.sets.forEach(s => {
    const w = parseFloat(s.w) || 0;
    const rpe = parseInt(s.rpe) || 8; // Default to 8 if not logged
    if (w > maxW) maxW = w;
    avgRPE += rpe;
    count++;
  });

  avgRPE = avgRPE / count;
  let suggestion = "";
  let nextWeight = maxW;

  if (avgRPE <= 7) {
    nextWeight = maxW + 5;
    suggestion = `Feeling strong! AI recommends increasing to <strong>${nextWeight} lbs</strong> next session.`;
  } else if (avgRPE <= 9) {
    nextWeight = maxW + 2.5;
    suggestion = `Solid work. Try a small jump to <strong>${nextWeight} lbs</strong> next time.`;
  } else {
    suggestion = `High intensity detected. Maintain <strong>${maxW} lbs</strong> to master form before increasing.`;
  }

  return suggestion;
}

/* ── UPDATED: RENDER EXERCISE CARD ── */
function renderExCard(ex, phase, week, dayIdx, exIdx, sessionKey) {
  const instructions = getExInstructions(ex.name);
  const gifUrl = GIF_MAP[ex.name] || null;
  const aiCoachTip = getAIProgression(sessionKey, exIdx);

  // Note: This is a conceptual update to your existing template literal
  return `
    <div class="ex-card ${isExOpen(sessionKey, exIdx)?'open':''}" id="ex-${sessionKey}-${exIdx}">
      <div class="ex-top" onclick="toggleEx('${sessionKey}',${exIdx})">
        <div class="ex-info">
          <div class="ex-name-row">
            <span class="ex-name-span">${ex.name}</span>
            ${YT[ex.name] ? `<div class="yt-pill" onclick="event.stopPropagation();openYT('${ex.name}')">▶ Video</div>` : ''}
          </div>
          <div class="ex-pres">${ex.p} — ${phase.rest}</div>
        </div>
        <div class="ex-chev">▼</div>
      </div>

      <div class="ex-body">
        ${instructions ? `
          <div class="instr-toggle" onclick="toggleInstructions(this)">
            <span>📖 Instructions & Form Guide</span>
          </div>
          <div class="instr-content">
            <div class="instr-gif">
              ${gifUrl ? `<img src="${gifUrl}" style="width:100%; border-radius:4px;">` : 'GIF Placeholder'}
            </div>
            <ul class="instr-list">
              ${instructions.map(i => `<li>${i}</li>`).join('')}
            </ul>
          </div>
        ` : ''}

        <div class="sets-table" style="margin-top:15px;">
           </div>

        ${aiCoachTip ? `
          <div class="ai-suggestion-box">
            <div class="ai-icon">🤖</div>
            <div class="ai-text">${aiCoachTip}</div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

/* ── NEW: UI HELPERS ── */
function toggleInstructions(btn) {
  const content = btn.nextElementSibling;
  content.classList.toggle('open');
  btn.querySelector('span').innerText = content.classList.contains('open') ? '▲ Hide Instructions' : '📖 Instructions & Form Guide';
}

// Ensure you call updateStats() or renderDay() inside your toggleSetDone 
// function to refresh the AI Coach tip when the last set is checked.
</script>
</body>
</html>
