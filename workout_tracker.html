        const ek=`${key}_e${ei}`;
        if(!S.sets[ek])S.sets[ek]=Array.from({length:ex.sets},()=>({reps:'',weight:'',notes:'',done:false}));
        const row=document.createElement('div');row.className='ex-compact';
        row.innerHTML=`<div class="ec-num">${ei+1}</div><div class="ec-name">${ex.name}</div><div class="ec-sets">${ex.p}</div><div class="ec-wt" style="color:var(--${ph.color})">${ex.w}</div>`;
        body.appendChild(row);
      });
    } else {
      const exList=document.createElement('div');exList.className='ex-list';
      day.exercises.forEach((ex,ei)=>{
        const ek=`${key}_e${ei}`;
        if(!S.sets[ek]){
          const _adj=applyDifficulty(ex,ph.id,week,di);
          const _baseW=_adj.adjW!==ex.w?_adj.adjW.match(/[\d.]+/)?.[0]||'':'';
          S.sets[ek]=Array.from({length:ex.sets},()=>({reps:'',weight:_baseW,notes:'',done:false}));
        }
        // superset connector before this exercise?
        if(ei>0){
          const prevEx=day.exercises[ei-1];
          if(SUPERSETS[prevEx.name]===ex.name||SUPERSETS[ex.name]===prevEx.name){
            const conn=document.createElement('div');conn.className='superset-connector';
            conn.innerHTML=`<div class="ss-line"></div><div class="ss-label">⇄ Superset</div><div class="ss-line"></div>`;
            exList.appendChild(conn);
          }
        }
        const effEx=getEffectiveExercise(ph,week,di,ei,ek)||(ex);
        exList.appendChild(makeExCard(effEx,ek,ei,ph,key));
      });
      body.appendChild(exList);
    }
    const rb=document.createElement('div');rb.className='rest-bar';rb.textContent='⏱ '+ph.rest;body.appendChild(rb);
    // RPE slider
    const rpeWrap=document.createElement('div');rpeWrap.className='rpe-section';
    const savedRPE=(S.rpe&&S.rpe[key])||5;
    const rpeLabels=['','Very Easy','Easy','Moderate','Somewhat Hard','Hard','Hard','Very Hard','Very Hard','Near Max','Max Effort'];
    rpeWrap.innerHTML=`<div class="rpe-label">Session RPE (effort)</div>
      <div class="rpe-row">
        <input type="range" class="rpe-slider" min="1" max="10" value="${savedRPE}" id="rpe-${key}"
          oninput="updateRPE('${key}',this.value)">
        <div class="rpe-val" id="rpeval-${key}" style="color:${savedRPE<=3?'var(--p2)':savedRPE<=6?'var(--accent)':'var(--red)'}">${savedRPE}</div>
      </div>
      <div class="rpe-desc" id="rpedesc-${key}">${rpeLabels[savedRPE]||''}</div>`;
    body.appendChild(rpeWrap);
    hd.onclick=()=>{hd.classList.toggle('col');body.classList.toggle('hide');};
    sec.append(hd,body);container.appendChild(sec);
  });
  // Render any saved custom workouts for this week
  const customKey=`cw_p${phaseId}_w${week}`;
  const savedCustom=S.customWorkouts&&S.customWorkouts[customKey]||[];
  savedCustom.forEach((cw,ci)=>renderCustomDay(cw,ci,customKey,ph,week,container));

  // Add workout button
  const addBtn=document.createElement('button');
  addBtn.className='add-workout-btn';
  addBtn.innerHTML='＋ Add Workout Day';
  addBtn.onclick=()=>openCWB(phaseId,week,ph);
  container.appendChild(addBtn);

  if(!compactView){
    setTimeout(()=>{
      getWeekDays(ph,week).forEach((day,di)=>{
        const key=wk(ph.id,week,di);
        day.exercises.forEach((ex,ei)=>{
          const ek2=`${key}_e${ei}`;
          const effEx2=getEffectiveExercise(ph,week,di,ei,ek2)||ex;
          renderSetRows(effEx2,ek2);
        });
      });
      // also render custom workout sets
      const cws=S.customWorkouts&&S.customWorkouts[customKey]||[];
      cws.forEach((cw,ci)=>{
        cw.exercises.forEach((ex,ei)=>renderSetRows(ex,`cw_${customKey}_${ci}_e${ei}`));
      });
    },0);
  }
}
function setView(compact,pid,w){compactView=compact;renderWeek(pid,w);}

// ═══════════════════════════════════════════════════ EXERCISE CARD

  const ekM=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);

  const isAdjusted=adj.level!=='medium';

  const ytUrl=YT[ex.name]||null;
  const hasPR=S.prs[ex.name];
  const card=document.createElement('div');card.className='ex-card';card.id=`exc-${ek}`;
  // get suggested weight from progression for this exercise
  const sugW=getSuggestedWeight(ek,ex);
  const top=document.createElement('div');top.className='ex-top';

    <div class="ex-num">${ei+1}</div>
    <div class="ex-info">

        ${ytUrl?`<button class="yt-pill" onclick="event.stopPropagation();openYT('${ytUrl}','${ex.name}')">▶ Watch</button>`:''}
        ${hasPR?`<span class="pr-badge-inline">PR ${hasPR.w}lb</span>`:''}
        ${isAdjusted?`<span class="diff-adj-badge ${adj.level}">${DIFF_EMOJI[adj.level]} ${adj.level}</span>`:''}
      </div>
      <div class="ex-pres">
        ${isAdjusted
          ? `<span style="text-decoration:line-through;opacity:.4;margin-right:4px">${ex.p}</span><strong>${adj.adjP}</strong>`
          : ex.p}
        ${(()=>{const m=(isAdjusted?adj.adjP:ex.p).match(/(\d+)/);if(!m)return'';const rr=getRepRange(m[1]);return rr&&getExType(ex.name).type==='weight'?`<span class="rep-range-badge ${rr.cls}">${rr.label}</span>`:'';})()} 
      </div>
    </div>
    <div class="ex-right">
      <div class="ex-wt" style="color:var(--${ph.color})">
        ${isAdjusted&&adj.adjW!==ex.w
          ? `<span style="text-decoration:line-through;opacity:.4;font-size:10px">${ex.w}</span><br>${adj.adjW}`
          : ex.w}
      </div>
      ${isBarbell(ex.name)?`<button class="ex-warmup-btn" onclick="event.stopPropagation();toggleWarmup('${ek}',${sugW||parseFloat(adj.adjW)||135})">Warm-up</button>`:''}
    </div>

  // Add swap button separately to avoid template literal escaping issues
  const swapBtn=document.createElement('button');

  swapBtn.textContent='✏️ Swap';

  top.querySelector('.ex-right').appendChild(swapBtn);

  const body=document.createElement('div');body.className='ex-body';

      ${DIFF_EMOJI[adj.level]} <strong>${adj.level.charAt(0).toUpperCase()+adj.level.slice(1)} mode:</strong> ${DIFF_INFO[adj.level]}
    </div>`;

  // exercise note history
  const exNoteHist=getExNoteHistory(ex.name,ek);
  if(exNoteHist.length){
    body.innerHTML+=`<div class="ex-note-history" id="enh-${ek}">

      ${exNoteHist.map(e=>`<div class="enh-entry"><span class="enh-date">${e.date}:</span> ${e.note}</div>`).join('')}
    </div>`;
    body.innerHTML+=`<button onclick="document.getElementById('enh-${ek}').classList.toggle('show')" style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);cursor:pointer;margin-bottom:8px">📝 Past notes (${exNoteHist.length})</button>`;

function getSuggestedWeight(ek,ex){
  // parse session key from ek: p1_w1_d0_e0
  const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m)return null;
  const pid=parseInt(m[1]),w=parseInt(m[2]),di=parseInt(m[3]),ei=parseInt(m[4]);
  // find prev matching session
  const allWeeks=[];
  PHASES.forEach(p=>p.weeks.forEach(ww=>getWeekDays(p,ww).forEach((_,d)=>allWeeks.push({pid:p.id,w:ww,di:d,key:wk(p.id,ww,d)}))));
  const curIdx=allWeeks.findIndex(e=>e.pid===pid&&e.w===w&&e.di===di);
  for(let i=curIdx-1;i>=0;i--){
    const prev=allWeeks[i];
    if(prev.di===di&&S.completed[prev.key]){
      const prevEk=`${prev.key}_e${ei}`;
      const sets=S.sets[prevEk]||[];
      const maxW=Math.max(...sets.map(s=>parseFloat(s.weight)||0).filter(v=>v>0));
      if(maxW>0){
        const allHit=sets.filter(s=>s.done||(s.reps&&parseInt(s.reps)>0)).every(s=>parseInt(s.reps)>=parseInt(ex.p.match(/\d+/)?.[0]||0));
        return allHit?maxW+5:maxW;
      }
    }
  }
  return null;
}

function isBarbell(name){return name.toLowerCase().includes('barbell')||name.toLowerCase().includes('deadlift')||name.toLowerCase().includes('squat');}

function toggleWarmup(ek,workingW){
  const el=document.getElementById(`wu-${ek}`);if(!el)return;
  if(el.classList.contains('show')){el.classList.remove('show');return;}
  const sets=calcWarmupSets(workingW);
  el.innerHTML=`<div class="warmup-title">Warm-up Sets (before working sets)</div><div class="warmup-row">${sets.map(s=>`<div class="warmup-set">${s.weight} lbs × ${s.reps}</div>`).join('')}</div>`;
  el.classList.add('show');
}
function calcWarmupSets(w){
  const bar=45;
  if(w<=bar+10)return[];
  const sets=[];
  sets.push({weight:bar,reps:10});
  const pcts=[.5,.6,.75,.9];
  pcts.forEach(p=>{
    const raw=Math.round(w*p/5)*5;
    if(raw>bar&&raw<w)sets.push({weight:raw,reps:p<.6?5:p<.75?3:1});
  });
  return sets;
}

function getPrevSetData(ek){
  // find previous matching exercise key
  const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m)return[];
  const pid=parseInt(m[1]),w=parseInt(m[2]),di=parseInt(m[3]),ei=parseInt(m[4]);
  const allWeeks=[];
  PHASES.forEach(p=>p.weeks.forEach(ww=>getWeekDays(p,ww).forEach((_,d)=>allWeeks.push({pid:p.id,w:ww,di:d,key:wk(p.id,ww,d)}))));
  const curIdx=allWeeks.findIndex(e=>e.pid===pid&&e.w===w&&e.di===di);
  for(let i=curIdx-1;i>=0;i--){
    const prev=allWeeks[i];
    if(prev.di===di&&S.completed[prev.key]){
      return S.sets[`${prev.key}_e${ei}`]||[];
    }
  }
  return[];
}

    if(isWeight){

      return`<div class="set-row" style="grid-template-columns:30px 1fr auto 1fr 34px">
        <div class="set-lbl">S${si+1}</div>

          value="${s.duration||''}" id="r-${ek}-${si}" onchange="upd('${ek}',${si},'duration',this.value)"/>
        <select class="si" style="width:80px;padding:5px 4px" id="u-${ek}-${si}" onchange="upd('${ek}',${si},'timeUnit',this.value)">
          ${unitOpts}
        </select>
        <input class="si${s.notes?' v':''}" type="text" placeholder="notes"
          value="${s.notes||''}" id="nt-${ek}-${si}" onchange="upd('${ek}',${si},'notes',this.value)"/>

    } else if(isIntervals){
      // intervals: rounds + effort dropdown + notes
      const effortOpts=['','Easy','Moderate','Hard','Max'].map(e=>`<option value="${e}"${(s.effort||'')=== e?' selected':''}>${e||'Effort'}</option>`).join('');

function upd(ek,si,field,val){
  if(!S.sets[ek])return;
  S.sets[ek][si][field]=val;
  const ids={reps:`r-${ek}-${si}`,weight:`wt-${ek}-${si}`,notes:`nt-${ek}-${si}`};
  const inp=document.getElementById(ids[field]);if(inp)inp.classList.toggle('v',!!val);
  // PR detection moved to togSet — only fires when set is explicitly marked done
  save();
}
function togSet(ek,si){
  if(!S.sets[ek])return;
  S.sets[ek][si].done=!S.sets[ek][si].done;
  const btn=document.getElementById(`ob-${ek}-${si}`);
  if(btn){btn.classList.toggle('done',S.sets[ek][si].done);btn.textContent=S.sets[ek][si].done?'✓':'○';}
  // PR detection: only runs when marking SET as DONE (not on typing)
  if(S.sets[ek][si].done){
    const s=S.sets[ek][si];
    const weight=parseFloat(s.weight||0);
    if(weight>0){
      const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
      if(m){
        const ph=ph_(parseInt(m[1]));
        const ex=ph&&ph.days[parseInt(m[3])]?.exercises[parseInt(m[4])];
        const now=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        if(ex&&detectPR(ex.name,weight,s.reps,now))toast(`🏆 New PR on ${ex.name}! ${weight} lbs`);
      }
    }
  }
  // auto-start corner timer
  if(S.sets[ek][si].done) startCornerTimer();
  // haptic on mobile
  if(navigator.vibrate)navigator.vibrate(40);
  // update ql display if open
  qlSyncOkBtn(ek,si);
  save();
}

// ═══════════════════════════════════════════════════ COMPLETE / SKIP
function toggleDone(ph,week,di,key){
  const was=!!S.completed[key];S.completed[key]=!was;
  if(S.skipped[key])S.skipped[key]=false;
  if(!was){
    const day=ph.days[di];let ts=0,tr=0;
    Object.keys(S.sets).filter(k=>k.startsWith(key+'_e')).forEach(ek=>{(S.sets[ek]||[]).forEach(s=>{if(s.reps||s.done){ts++;tr+=parseInt(s.reps)||0;}});});
    const note=S.sessionNotes[key]||'';
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const readiness=S.readiness[today]||null;
    S.history=S.history.filter(h=>h.key!==key);
    const trainedDay=(S.workoutDays&&S.workoutDays[key])||new Date().toLocaleDateString('en-US',{weekday:'short'});
    const sessionDiff=getDiff(ph.id,week,di);
    const _hDay=getWeekDays(ph,week)[di]||{name:'Day',title:'Workout'};
    S.history.unshift({key,date:today,phase:ph.label,phaseColor:ph.color,week,day:_hDay.name,title:_hDay.title,ts,tr,note,readiness,trainedDay,difficulty:sessionDiff});
    toast('Workout logged! 💪');
    // check new achievements
    setTimeout(()=>checkNewAchievements(),100);
  }
  save();
  const mb=document.getElementById(`mb-${key}`),sb=document.getElementById(`sb-${key}`),hd=document.getElementById(`dshd-${key}`);
  if(mb){mb.textContent=S.completed[key]?'✓ Completed':'Mark Complete';mb.classList.toggle('done',!!S.completed[key]);mb.classList.toggle('primary',!S.completed[key]);}
  if(sb){sb.textContent='Skip Session';sb.classList.remove('skipped');}
  if(hd){hd.classList.toggle('done',!!S.completed[key]);hd.classList.remove('skipped');}
}
function toggleSkip(ph,week,di,key){
  const was=!!S.skipped[key];S.skipped[key]=!was;
  if(S.completed[key])S.completed[key]=false;save();
  const sb=document.getElementById(`sb-${key}`),mb=document.getElementById(`mb-${key}`),hd=document.getElementById(`dshd-${key}`);
  if(sb){sb.textContent=S.skipped[key]?'↩ Unskip':'Skip Session';sb.classList.toggle('skipped',!!S.skipped[key]);}
  if(mb){mb.textContent='Mark Complete';mb.classList.remove('done');mb.classList.add('primary');}
  if(hd){hd.classList.toggle('skipped',!!S.skipped[key]);hd.classList.remove('done');}
  if(S.skipped[key])toast('Session marked as skipped');
}

// ═══════════════════════════════════════════════════ COPY LAST
function copyLast(ph,week,di,key){
  const allWeeks=[];
  PHASES.forEach(p=>p.weeks.forEach(w=>getWeekDays(p,w).forEach((_,d)=>allWeeks.push({pid:p.id,w,di:d,key:wk(p.id,w,d)}))));
  const curIdx=allWeeks.findIndex(e=>e.key===key);
  for(let i=curIdx-1;i>=0;i--){
    const prev=allWeeks[i];
    if(prev.di===di&&S.completed[prev.key]){
      const prevPh=ph_(prev.pid);let copied=0;
      const prevDayExs=getWeekDays(prevPh,prev.w)[di]?.exercises||[];
      prevDayExs.forEach((ex,ei)=>{
        const prevEk=`${prev.key}_e${ei}`,curEk=`${key}_e${ei}`;
        const ps=S.sets[prevEk]||[];
        if(!S.sets[curEk])S.sets[curEk]=Array.from({length:ex.sets},()=>({reps:'',weight:'',notes:'',done:false}));
        ps.forEach((s,si)=>{if(s.weight&&S.sets[curEk][si]){S.sets[curEk][si].weight=s.weight;copied++;}});
      });
      save();
      ph.days[di].exercises.forEach((ex,ei)=>renderSetRows(ex,`${key}_e${ei}`));
      toast(copied>0?`Copied ${copied} weights from previous session ✓`:'No weights found in previous session');
      return;
    }
  }
  toast('No previous matching session found');
}

function calcPlates(){
  const target=parseFloat(document.getElementById('plate-target').value)||135;
  const bar=45;
  const perSide=(target-bar)/2;
  const available=[45,35,25,10,5,2.5,1.25];
  const classes={45:'p45',35:'p35',25:'p25',10:'p10',5:'p5',2.5:'p25s',1.25:'p125'};
  let rem=perSide,plates=[];
  available.forEach(p=>{while(rem>=p-0.001){rem=Math.round((rem-p)*100)/100;plates.push(p);}});
  const el=document.getElementById('plate-result');
  if(perSide<0){el.innerHTML='<div style="color:var(--red);font-size:13px">Weight must be at least 45 lbs (bar only)</div>';return;}
  if(rem>0.01){el.innerHTML='<div style="color:var(--text3);font-size:13px">Cannot be loaded exactly with standard plates</div>';return;}
  // group plates
  const grouped={};plates.forEach(p=>{grouped[p]=(grouped[p]||0)+1;});
  const chips=Object.entries(grouped).sort((a,b)=>b[0]-a[0]).map(([p,n])=>`<div class="plate-chip ${classes[p]||'p5'}">${n>1?n+'×':''}${p}</div>`).join('');
  el.innerHTML=`
    <div class="plate-result-title">Each side of the bar:</div>
    <div class="plate-side">${chips}</div>
    <div class="plate-note">Bar: 45 lbs + ${perSide} lbs each side = ${target} lbs total</div>
  `;
}

// ═══════════════════════════════════════════════════ WEEKLY VOLUME
function getWeekVolume(phaseId,week){
  const ph=ph_(phaseId);
  let sets=0,reps=0,tonnage=0;
  getWeekDays(ph,week).forEach((day,di)=>{
    const key=wk(ph.id,week,di);
    if(!S.completed[key])return;
    day.exercises.forEach((ex,ei)=>{
      const ek=`${key}_e${ei}`;
      (S.sets[ek]||[]).forEach(s=>{
        if(s.reps||s.done){
          sets++;
          const r=parseInt(s.reps)||0;
          const w=parseFloat(s.weight)||0;
          reps+=r;
          if(w>0)tonnage+=r*w;
        }
      });
    });
  });
  // get prev matching week
  let prevSets=0,prevReps=0;
  const allW=[];
  PHASES.forEach(p=>p.weeks.forEach(w=>allW.push({pid:p.id,w})));
  const ci=allW.findIndex(e=>e.pid===phaseId&&e.w===week);
  for(let i=ci-1;i>=0;i--){
    const prev=allW[i];
    const prevPh=ph_(prev.pid);
    if(prevPh.days.some((_,di)=>S.completed[wk(prev.pid,prev.w,di)])){
      getWeekDays(prevPh,prev.w).forEach((day,di)=>{
        const key=wk(prev.pid,prev.w,di);
        if(!S.completed[key])return;
        day.exercises.forEach((ex,ei)=>{
          (S.sets[`${key}_e${ei}`]||[]).forEach(s=>{if(s.reps||s.done){prevSets++;prevReps+=parseInt(s.reps)||0;}});
        });
      });
      break;
    }
  }
  return{sets,reps,tonnage:Math.round(tonnage),prevSets,prevReps};
}

// ═══════════════════════════════════════════════════ EXERCISE NOTE HISTORY
function getExNoteHistory(exName,currentEk){
  const results=[];
  PHASES.forEach(ph=>ph.weeks.forEach(w=>getWeekDays(ph,w).forEach((day,di)=>{
    const key=wk(ph.id,w,di);
    if(!S.completed[key])return;
    day.exercises.forEach((ex,ei)=>{
      if(ex.name!==exName)return;
      const ek=`${key}_e${ei}`;
      if(ek===currentEk)return; // skip current
      // check set notes
      const setNotes=(S.sets[ek]||[]).map(s=>s.notes).filter(Boolean);
      if(setNotes.length){
        const he=S.history.find(h=>h.key===key);
        results.push({date:he?he.date:`Wk ${w}`,note:setNotes.join(' · ')});
      }
    });
  })));
  return results.slice(-3).reverse();
}

// ═══════════════════════════════════════════════════ QUICK-LOG MODE
let _qlExercises=[],_qlIdx=0,_qlKey='';

function openQL(ek,e){
  if(e)e.stopPropagation();
  // build exercise list for this session from ek key
  const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m)return;
  const ph=ph_(parseInt(m[1]));
  const week=parseInt(m[2]),di=parseInt(m[3]),ei=parseInt(m[4]);
  _qlKey=wk(ph.id,week,di);
  const day=ph.days[di];
  _qlExercises=day.exercises.map((ex,i)=>({ex,ek:`${_qlKey}_e${i}`,ei:i,ph}));
  _qlIdx=ei;
  _activeRestSec=ph.restSec||90;
  document.getElementById('ql-overlay').style.display='flex';
  document.body.style.overflow='hidden';
  qlRender();
}

function qlRender(){
  const item=_qlExercises[_qlIdx];if(!item)return;
  const{ex,ek,ph}=item;
  if(!S.sets[ek])S.sets[ek]=Array.from({length:ex.sets},()=>({reps:'',weight:'',notes:'',done:false}));
  const sets=S.sets[ek];
  const prevSets=getPrevSetData(ek);
  document.getElementById('ql-ex-name').textContent=ex.name;
  document.getElementById('ql-progress').textContent=`Exercise ${_qlIdx+1} of ${_qlExercises.length} · ${ex.p}`;
  // Build subtitle: target weight + suggested weight
  const _adj=applyDifficulty(ex,parseInt(ek.match(/p(\d+)/)?.[1]||1),
    parseInt(ek.match(/w(\d+)/)?.[1]||1),parseInt(ek.match(/d(\d+)/)?.[1]||0));
  const sugW2=getSuggestedWeight(ek,ex);
  let subParts=[];
  subParts.push(`📋 Target: ${_adj.adjW!==ex.w?_adj.adjW:ex.w}`);
  if(sugW2)subParts.push(`💡 Suggested: ${sugW2} lbs (based on last session)`);
  document.getElementById('ql-ex-sub').textContent=subParts.join('  ·  ');
  // prev
  const prevEl=document.getElementById('ql-prev');
  if(prevSets.length){
    const prevInfo=prevSets.map((s,i)=>`S${i+1}: ${s.reps||'?'} reps @ ${s.weight||'?'} lbs`).filter((_,i)=>prevSets[i].reps||prevSets[i].weight).join(' · ');
    if(prevInfo){prevEl.style.display='block';prevEl.textContent='Last time: '+prevInfo;}
    else prevEl.style.display='none';
  } else prevEl.style.display='none';
  // sets
  const setsEl=document.getElementById('ql-sets');
  const et=getExType(ex.name);
  setsEl.innerHTML=sets.map((s,si)=>`
    <div class="ql-set-row">
      <div class="ql-set-lbl">S${si+1}</div>
      <input class="ql-input${s.reps?' v':''}" type="number" inputmode="numeric" placeholder="${et.type==='time'?'secs':'reps'}"
        value="${s.reps||s.duration||''}" id="qlr-${ek}-${si}"
        onchange="qlUpd('${ek}',${si},'${et.type==='time'?'duration':'reps'}',this.value)">
      ${et.type==='weight'?`<input class="ql-input${s.weight?' v':''}" type="text" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" id="qlw-${ek}-${si}"
        onchange="qlUpd('${ek}',${si},'weight',this.value)">`:'<div></div>'}
      <button class="ql-ok${s.done?' done':''}" id="qlok-${ek}-${si}"
        onclick="qlToggle('${ek}',${si})">${s.done?'✓':'○'}</button>
    </div>
  `).join('');
  // nav buttons
  document.getElementById('ql-prev-btn').style.display=_qlIdx>0?'block':'none';
  document.getElementById('ql-next-btn').textContent=_qlIdx<_qlExercises.length-1?'Next →':'Done ✓';
}

let _cwbPhaseId=null,_cwbWeek=null,_cwbPh=null,_cwbExercises=[];

function openCWB(phaseId,week,ph){
  _cwbPhaseId=phaseId;_cwbWeek=week;_cwbPh=ph;
  const customKey=`cw_p${phaseId}_w${week}`;
  const existing=S.customWorkouts&&S.customWorkouts[customKey]||[];
  document.getElementById('cwb-title').textContent=`Add Workout · Week ${week}`;
  const rec=recommendWorkout(phaseId,week,ph);
  _cwbExercises=[...rec.exercises];
  renderCWBBody(rec);
  document.getElementById('cwb-modal').classList.add('on');
  document.body.style.overflow='hidden';
}

function recommendWorkout(phaseId,week,ph){
  // Analyse what's already been trained this week
  const trained={lower:0,push:0,pull:0,arms:0,core:0,cardio:0};
  getWeekDays(ph,week).forEach((day,di)=>{
    const key=wk(ph.id,week,di);
    if(!S.completed[key]&&!S.skipped[key])return;
    const title=day.title.toLowerCase();
    if(title.includes('lower'))trained.lower++;
    if(title.includes('push')||title.includes('bench'))trained.push++;
    if(title.includes('pull'))trained.pull++;
    if(title.includes('arm'))trained.arms++;
    if(title.includes('cardio')||title.includes('condition'))trained.cardio++;
    // also count from exercises
    day.exercises.forEach(ex=>{
      const ec=ALL_EXERCISES.find(e=>e.name===ex.name);
      if(ec)trained[ec.cat]=(trained[ec.cat]||0)+0.5;
    });
  });
  // Also count custom workouts this week
  const customKey=`cw_p${phaseId}_w${week}`;
  (S.customWorkouts&&S.customWorkouts[customKey]||[]).forEach(cw=>{
    cw.exercises.forEach(ex=>{
      const ec=ALL_EXERCISES.find(e=>e.name===ex.name);
      if(ec)trained[ec.cat]=(trained[ec.cat]||0)+0.5;
    });
  });
  // Find least trained categories
  const priority=['pull','push','lower','arms','core'].sort((a,b)=>(trained[a]||0)-(trained[b]||0));
  const focus=priority[0];
  const focus2=priority[1];
  // Build recommended session
  const pool=ALL_EXERCISES.filter(e=>e.cat===focus);
  const pool2=ALL_EXERCISES.filter(e=>e.cat===focus2);
  const cardio=ALL_EXERCISES.filter(e=>e.cat==='cardio');
  const core=ALL_EXERCISES.filter(e=>e.cat==='core');
  let exercises=[];
  // 2–3 from primary focus
  pool.slice(0,3).forEach(e=>exercises.push({...e}));
  // 1–2 from secondary
  pool2.slice(0,2).forEach(e=>exercises.push({...e}));
  // 1 core + 1 cardio
  if(core.length)exercises.push({...core[0]});
  if(cardio.length)exercises.push({...cardio[0]});
  const focusLabel=`${focus.charAt(0).toUpperCase()+focus.slice(1)} + ${focus2.charAt(0).toUpperCase()+focus2.slice(1)}`;
  let reason=`Based on this week's sessions, you haven't trained ${focus} much. `;
  if(trained[focus]===0)reason=`You haven't done any ${focus} work this week yet. `;
  reason+=`This session balances it out with a ${focusLabel} focus.`;
  return{focus,focus2,exercises,reason,title:`Bonus: ${focusLabel}`};
}

  const body=document.getElementById('cwb-body');
  _cwbFocus=rec?rec.focus:'';
  const focusCats=['lower','push','pull','arms','core','cardio'];
  body.innerHTML=`
    <div class="cwb-rec-banner" id="cwb-rec-banner">${rec?'💡 '+rec.reason:'Pick a focus to get started.'}</div>
    <div class="cwb-section-title">Focus</div>
    <div class="cwb-focus-pills">
      ${focusCats.map(f=>`<div class="cwb-focus-pill${_cwbFocus===f?' on':''}" onclick="cwbSetFocus('${f}')">${f.charAt(0).toUpperCase()+f.slice(1)}</div>`).join('')}
    </div>
    <div class="cwb-section-title">Workout Name</div>

function renderCWBExList(){
  const list=document.getElementById('cwb-ex-list');if(!list)return;
  const exOptions=ALL_EXERCISES.map(e=>`<option value="${e.name}">${e.name} (${e.cat})</option>`).join('');

function cwbSetFocus(focus){
  _cwbFocus=focus;
  const rec=recommendWorkout(_cwbPhaseId,_cwbWeek,_cwbPh);
  // rebuild exercises for this focus
  const pool=ALL_EXERCISES.filter(e=>e.cat===focus);
  _cwbExercises=pool.slice(0,4).map(e=>({...e}));
  const core=ALL_EXERCISES.find(e=>e.cat==='core'&&e.name!=='Full core circuit');
  if(core&&focus!=='core')_cwbExercises.push({...core});
  document.querySelectorAll('.cwb-focus-pill').forEach(p=>p.classList.remove('on'));
  event.target.classList.add('on');
  const banner=document.getElementById('cwb-rec-banner');
  if(banner)banner.textContent=`💡 Showing ${focus} exercises. Customise by swapping or adding below.`;
  renderCWBExList();
}

function cwbChangeEx(idx,name){
  const found=ALL_EXERCISES.find(e=>e.name===name);
  if(found)_cwbExercises[idx]={...found};
}

function cwbAddExercise(){
  const first=ALL_EXERCISES[0];
  _cwbExercises.push({...first});
  renderCWBExList();
}

function cwbRemoveEx(idx){
  _cwbExercises.splice(idx,1);
  renderCWBExList();
}

function saveCWB(){
  if(!_cwbExercises.length){toast('Add at least one exercise');return;}
  const name=document.getElementById('cwb-name')?.value||'Custom Workout';
  const customKey=`cw_p${_cwbPhaseId}_w${_cwbWeek}`;
  if(!S.customWorkouts)S.customWorkouts={};
  if(!S.customWorkouts[customKey])S.customWorkouts[customKey]=[];
  const ci=S.customWorkouts[customKey].length;
  S.customWorkouts[customKey].push({name,exercises:[..._cwbExercises],createdAt:new Date().toISOString()});
  save();
  closeCWB();
  renderWeek(_cwbPhaseId,_cwbWeek);
  toast(`"${name}" added to Week ${_cwbWeek} ✓`);
}

function renderCustomDay(cw,ci,customKey,ph,week,container){
  const key=`cw_${customKey}_${ci}`;
  const isDone=!!(S.completed&&S.completed[key]);
  const isSkipped=!!(S.skipped&&S.skipped[key]);
  const sec=document.createElement('div');sec.className='day-section';
  const hd=document.createElement('div');
  hd.className=`ds-hd${isDone?' done':isSkipped?' skipped':''}`;hd.id=`dshd-${key}`;
  hd.innerHTML=`<span class="ds-tag p2" style="background:var(--p2bg);color:var(--p2)">Bonus</span><span class="ds-title">${cw.name}</span><span class="ds-chip done-chip">✓ Done</span><span class="ds-chip skip-chip">— Skipped</span><span class="ds-chev">▼</span>`;
  const body=document.createElement('div');body.className='ds-body';body.id=`dsbody-${key}`;

  // Actions
  const actions=document.createElement('div');actions.className='session-actions';
  const mb=document.createElement('button');mb.className=`act-btn${isDone?' done':' primary'}`;mb.id=`mb-${key}`;
  mb.textContent=isDone?'✓ Completed':'Mark Complete';
  mb.onclick=e=>{e.stopPropagation();toggleCustomDone(ph,week,ci,customKey,key,cw);};
  const sb=document.createElement('button');sb.className='act-btn';
  sb.textContent='🗑 Remove';
  sb.onclick=e=>{e.stopPropagation();removeCustomWorkout(customKey,ci,ph.id,week);};
  const tb=document.createElement('button');tb.className='act-btn';
  tb.textContent='⏱ Timer';
  tb.onclick=e=>{e.stopPropagation();openTimer({title:cw.name},60);};
  actions.append(mb,sb,tb);body.appendChild(actions);

  // Note
  const noteTA=document.createElement('textarea');noteTA.className='session-note';
  noteTA.placeholder='Notes for this bonus session...';
  noteTA.value=(S.sessionNotes&&S.sessionNotes[key])||'';noteTA.rows=2;
  noteTA.onchange=()=>{if(!S.sessionNotes)S.sessionNotes={};S.sessionNotes[key]=noteTA.value;save();};
  body.appendChild(noteTA);

  // Exercises
  const exList=document.createElement('div');exList.className='ex-list';
  cw.exercises.forEach((ex,ei)=>{
    const ek=`${key}_e${ei}`;
    if(!S.sets)S.sets={};
    if(!S.sets[ek])S.sets[ek]=Array.from({length:ex.sets||3},()=>({reps:'',weight:'',notes:'',done:false}));
    const fakePhForColors={color:'p2',restSec:60};
    exList.appendChild(makeExCard(ex,ek,ei,fakePhForColors,key));
  });
  body.appendChild(exList);
  const rb=document.createElement('div');rb.className='rest-bar';rb.textContent='⏱ 60s rest between sets';body.appendChild(rb);
  hd.onclick=()=>{hd.classList.toggle('col');body.classList.toggle('hide');};
  sec.append(hd,body);container.appendChild(sec);
}

function toggleCustomDone(ph,week,ci,customKey,key,cw){
  if(!S.completed)S.completed={};
  const was=!!S.completed[key];S.completed[key]=!was;
  if(!was){
    if(!S.history)S.history=[];
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    S.history.unshift({key,date:today,phase:ph.label,phaseColor:ph.color,week,day:'Bonus',title:cw.name,ts:0,tr:0,note:'',trainedDay:new Date().toLocaleDateString('en-US',{weekday:'short'}),difficulty:'medium'});
    toast('Bonus workout logged! 💪');
  }
  save();
  const mb=document.getElementById(`mb-${key}`),hd=document.getElementById(`dshd-${key}`);
  if(mb){mb.textContent=S.completed[key]?'✓ Completed':'Mark Complete';mb.classList.toggle('done',!!S.completed[key]);mb.classList.toggle('primary',!S.completed[key]);}
  if(hd)hd.classList.toggle('done',!!S.completed[key]);
}

function removeCustomWorkout(customKey,ci,phaseId,week){
  if(!confirm('Remove this bonus workout?'))return;
  if(S.customWorkouts&&S.customWorkouts[customKey]){
    S.customWorkouts[customKey].splice(ci,1);
    if(!S.customWorkouts[customKey].length)delete S.customWorkouts[customKey];
  }
  save();
  renderWeek(phaseId,week);
  toast('Workout removed');
}

// ═══════════════════════════════════════════════════ PLATE CHANGE CALCULATOR
function openPlateChange(ek,btn){
  btn.stopPropagation&&btn.stopPropagation();
  const pcc=document.getElementById(`pcc-${ek}`);
  if(!pcc)return;
  pcc.classList.toggle('show');
}
function calcPlateChange(ek){
  const fromInp=document.getElementById(`pcc-from-${ek}`);
  const toInp=document.getElementById(`pcc-to-${ek}`);
  const res=document.getElementById(`pcc-res-${ek}`);
  if(!fromInp||!toInp||!res)return;
  const from=parseFloat(fromInp.value)||0;
  const to=parseFloat(toInp.value)||0;
  if(!from||!to){res.innerHTML='Enter both weights';return;}
  const bar=45;
  const fromSide=(from-bar)/2;
  const toSide=(to-bar)/2;
  const diff=toSide-fromSide;
  const plates=[45,35,25,10,5,2.5];
  function breakdown(lbs){
    let rem=Math.abs(lbs),parts=[];
    plates.forEach(p=>{while(rem>=p-0.001){rem=Math.round((rem-p)*100)/100;parts.push(p);}});
    return parts;
  }
  if(Math.abs(diff)<0.1){res.innerHTML='Same weight — no change needed';return;}
  const action=diff>0?'ADD':'REMOVE';
  const cls=diff>0?'pcc-add':'pcc-remove';
  const bds=breakdown(diff);
  res.innerHTML=`<span class="${cls}">${action} per side:</span> ${bds.map(p=>`<strong>${p} lb</strong>`).join(' + ')||'fractional plates'}<br><small style="color:var(--text3)">${from} → ${to} lbs total</small>`;
}

// ═══════════════════════════════════════════════════ 1RM TREND
function render1RMTrend(){
  const el=document.getElementById('rm1-trend-card');if(!el)return;
  const keyLifts=[
    {name:'Barbell bench press',label:'Bench'},
    {name:'Barbell back squat',label:'Squat'},
    {name:'Barbell deadlift',label:'Deadlift'},
  ];
  el.innerHTML=`<div style="font-size:14px;font-weight:600;margin-bottom:4px">Estimated 1RM Trend</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Calculated from your best logged sets using the Epley formula</div>
    <div class="rm1-grid" id="rm1-grid"></div>`;
  const grid=document.getElementById('rm1-grid');
  keyLifts.forEach(lift=>{
    const history=get1RMHistory(lift.name);
    const latest=history.length?history[history.length-1]:null;
    const first=history.length?history[0]:null;
    const current=latest?latest.rm1:null;
    const delta=first&&latest&&first!==latest?latest.rm1-first.rm1:null;
    const div=document.createElement('div');div.className='rm1-item';
    div.innerHTML=`<div class="rm1-lift">${lift.label}</div>
      <div class="rm1-val">${current?current:'—'}<small>${current?'lbs':''}</small></div>
      ${delta!==null?`<div class="rm1-change ${delta>0?'pos':delta<0?'neg':'neu'}">${delta>0?'+':''}${delta} lbs</div>`:'<div class="rm1-change neu">No data yet</div>'}`;
    grid.appendChild(div);
  });
}

function get1RMHistory(exName){
  const res=[];
  PHASES.forEach(ph=>ph.weeks.forEach(w=>getWeekDays(ph,w).forEach((day,di)=>{
    const key=wk(ph.id,w,di);
    if(!S.completed[key])return;
    day.exercises.forEach((ex,ei)=>{
      if(ex.name!==exName)return;
      const ek=`${key}_e${ei}`;
      const sets=S.sets[ek]||[];
      sets.forEach(s=>{
        const weight=parseFloat(s.weight||0);
        const reps=parseInt(s.reps||0);
        if(weight>0&&reps>0){
          const rm1=epley1RM(weight,reps);
          const he=S.history.find(h=>h.key===key);
          res.push({rm1,date:he?he.date:`Wk ${w}`,week:w});
        }
      });
    });
  })));
  // deduplicate by week, take max per week
  const byWeek={};
  res.forEach(r=>{if(!byWeek[r.week]||r.rm1>byWeek[r.week].rm1)byWeek[r.week]=r;});
  return Object.values(byWeek).sort((a,b)=>a.week-b.week);
}

// ═══════════════════════════════════════════════════ WORKOUT TEMPLATES
function renderTemplates(){
  const el=document.getElementById('template-section');if(!el)return;
  const templates=Object.entries(S.templates||{});
  el.innerHTML=`<div class="template-hd">
    <div style="font-size:14px;font-weight:600">Saved Templates</div>
  </div>`;
  if(!templates.length){
    el.innerHTML+=`<div style="font-size:13px;color:var(--text3)">No templates yet. Open any workout and tap "💾 Save Template" to save it for reuse in the custom workout builder.</div>`;
    return;
  }
  el.innerHTML+=`<div class="template-grid" id="tmpl-grid"></div>`;
  const grid=document.getElementById('tmpl-grid');
  templates.forEach(([name,tmpl])=>{
    const chip=document.createElement('div');chip.className='template-chip';
    chip.innerHTML=`${name} <span style="font-size:10px;color:var(--text3)">(${tmpl.exercises?.length||0} ex)</span>`;
    chip.onclick=()=>{
      if(confirm(`Load template "${name}" into the workout builder?`)){
        _cwbExercises=[...(tmpl.exercises||[])];
        const cwbNameEl=document.getElementById('cwb-name');
        if(cwbNameEl)cwbNameEl.value=name;
        renderCWBExList();
        toast(`Template "${name}" loaded ✓`);
      }
    };
    grid.appendChild(chip);
    // delete button
    const del=document.createElement('span');del.style.cssText='font-size:11px;color:var(--red);cursor:pointer;margin-left:4px;';del.textContent='✕';
    del.onclick=(e)=>{e.stopPropagation();if(confirm(`Delete template "${name}"?`)){delete S.templates[name];save();renderTemplates();toast('Template deleted');}};
    chip.appendChild(del);
  });
}

function saveAsTemplate(ph,week,di,key){
  const day=getWeekDays(ph,week)[di];
  if(!day)return;
  const name=prompt(`Save as template:`,day.title)||day.title;
  if(!name)return;
  if(!S.templates)S.templates={};
  S.templates[name]={exercises:day.exercises.map(e=>({...e})),savedAt:new Date().toISOString()};
  save();
  toast(`Template "${name}" saved ✓`);
}


// ═══════════════════════════════════════════════════ EXERCISE SWAP
let _swapEk='',_swapEi=0,_swapSessionKey='',_swapPhaseId=null,_swapCurrentName='';

function openSwap(ek,ei,sessionKey,phaseId){
  _swapEk=ek;_swapEi=ei;_swapSessionKey=sessionKey;_swapPhaseId=phaseId;
  // figure out current exercise name
  const m=ek.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m){
    // custom workout exercise
    _swapCurrentName='';
  } else {
    const ph=ph_(parseInt(m[1]));
    const w=parseInt(m[2]),di=parseInt(m[3]);
    const day=getWeekDays(ph,w)[di];
    _swapCurrentName=day?.exercises[ei]?.name||'';
  }
  document.getElementById('ex-swap-search').value='';
  renderSwapList('');
  document.getElementById('ex-swap-modal').classList.add('on');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('ex-swap-search').focus(),100);
}

function closeSwap(){
  document.getElementById('ex-swap-modal').classList.remove('on');
  document.body.style.overflow='';
}
function swapBgClick(e){if(e.target===document.getElementById('ex-swap-modal'))closeSwap();}

function renderSwapList(filter){
  const list=document.getElementById('ex-swap-list');if(!list)return;
  const q=filter.toLowerCase().trim();
  const cats=['lower','push','pull','arms','core','cardio'];
  const catLabels={lower:'Lower Body',push:'Push',pull:'Pull',arms:'Arms',core:'Core',cardio:'Cardio'};
  let html='';
  cats.forEach(cat=>{
    const items=ALL_EXERCISES.filter(e=>
      e.cat===cat&&(!q||e.name.toLowerCase().includes(q))
    );
    if(!items.length)return;
    html+=`<div class="ex-swap-cat">${catLabels[cat]}</div>`;
    items.forEach(ex=>{
      const isCurrent=ex.name===_swapCurrentName;
      html+=`<div class="ex-swap-item${isCurrent?' current':''}" onclick="doSwap('${ex.name.replace(/'/g,"\\'")}')">
        <div class="ex-swap-name">${ex.name}${isCurrent?' <span style="font-size:10px;color:var(--p2)">current</span>':''}</div>
        <div class="ex-swap-cat-badge">${cat}</div>
      </div>`;
    });
  });
  if(!html)html='<div style="padding:20px;text-align:center;color:var(--text3)">No exercises found</div>';
  list.innerHTML=html;
}

function filterSwapList(q){renderSwapList(q);}

function doSwap(newExName){
  const newEx=ALL_EXERCISES.find(e=>e.name===newExName);
  if(!newEx){closeSwap();return;}
  // Parse the session key to find the phase/week/day/exercise
  const m=_swapEk.match(/p(\d+)_w(\d+)_d(\d+)_e(\d+)/);
  if(!m){closeSwap();return;}
  const pid=parseInt(m[1]),w=parseInt(m[2]),di=parseInt(m[3]),ei=parseInt(m[4]);
  const ph=ph_(pid);
  if(!ph){closeSwap();return;}
  const day=getWeekDays(ph,w)[di];
  if(!day){closeSwap();return;}
  // Swap the exercise in the day's exercises array
  // Store swaps in S.exerciseSwaps so they persist
  if(!S.exerciseSwaps)S.exerciseSwaps={};
  S.exerciseSwaps[_swapEk]={name:newEx.name,p:newEx.p,w:newEx.w,sets:newEx.sets,note:newEx.note||''};
  // Reset the set data for this exercise slot so old weights don't carry over
  S.sets[_swapEk]=Array.from({length:newEx.sets},()=>({reps:'',weight:'',notes:'',done:false}));
  save();
  closeSwap();
  // Re-render the week view
  if(curPhase&&curWeek)renderWeek(curPhase,curWeek);
  toast(`Swapped to ${newEx.name} ✓`);
}

// Helper: get the actual exercise for a slot (checking swaps first)
function getEffectiveExercise(ph,week,di,ei,ek){
  if(S.exerciseSwaps&&S.exerciseSwaps[ek]){
    return S.exerciseSwaps[ek];
  }
  return getWeekDays(ph,week)[di]?.exercises[ei]||null;
}

// ═══════════════════════════════════════════════════ TOAST
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ═══════════════════════════════════════════════════ AUTH UI
function updateAuthUI(user){
  const el=document.getElementById('auth-ui');if(!el)return;
  if(user){
    const name=user.displayName?user.displayName.split(' ')[0]:'You';
    const photo=user.photoURL?`<img class="auth-avatar" src="${user.photoURL}" alt="">`:'👤';
    el.innerHTML=`<button class="auth-btn signed-in" onclick="window.fbSignOut()">${photo} ${name} · Sign out</button>`;
  } else {
    el.innerHTML=`<button class="auth-btn" onclick="window.fbSignIn()">Sign in with Google</button>`;
  }
}
function renderSyncStatus(msg){
  const el=document.getElementById('sync-status');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// expose to module scope
window.updateAuthUI = updateAuthUI;
window.renderSyncStatus = renderSyncStatus;

// ═══════════════════════════════════════════════════ INIT
// Show sign-in screen if no auth yet — Firebase module will call renderHome when signed in
updateAuthUI(null);
go('home');
</script>
